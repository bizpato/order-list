    showToast('物件・ご契約者情報を入力してください');
    openStep('propInfo');
    return;
  }
  // メーカー選択未選択アラート
  const unselectedGrades = GRADE_GROUPS.filter(g => !state.gradeSelections[g.id]);
  if (unselectedGrades.length > 0) {
    const names = unselectedGrades.map(g => g.name).join('、');
    if (!confirm(`⚠️ 以下のメーカー選択が未選択です:\n${names}\n\nこの内容で発注しますか？`)) return;
  }
  const p = state.property;
  const contactName = p.contactSameAsOwner ? p.owner : (p.contact || p.owner);
  const units = (p.units || []);
  const numUnits = units.length;

  // ── 送信済みチェック（1物件番号1回制限） ──
  const allNumbers = units.map(u => u.number||'').filter(Boolean);
  if (isAlreadySubmitted(allNumbers)) {
    showDuplicateSubmitScreen(p, units);
    return;
  }
  const isMulti = numUnits > 1;

  const total = calcTotal();
  const famCountEmail = p.familyUnitCount;
  let body = '【初回セット・補充備品発注】\n';
  body += '============================\n';
  body += 'ご契約者様名：' + p.owner + '\n';
  body += 'ご担当者名：' + contactName + '\n';
  body += '連絡先メール：' + p.email + '\n';
  body += '契約室数：' + numUnits + '室';
  if (famCountEmail > 0) body += '（うちファミリー対応 ' + famCountEmail + '室）';
  body += '\n';
  body += '============================\n';
  // 物件ごとの内訳
  body += '【契約物件内訳】\n';
  units.forEach((u, i) => {
    body += '─ 物件 #' + (i+1) + ' ─\n';
    body += '  物件番号：' + (u.number||'') + '\n';
    body += '  最大宿泊人数：' + (u.maxGuests||0) + '名\n';
    body += '  バスルーム：' + (u.bathrooms||0) + '室\n';
    body += '  トイレ：' + (u.toilets||0) + '室\n';
    body += '  ファミリー対応：' + (u.isFamily === true ? 'はい' : 'いいえ') + '\n';
  });
  if (isMulti) {
    body += '─ 合算（全' + numUnits + '室） ─\n';
    body += '  最大宿泊人数：' + p.maxGuests + '名\n';
    body += '  バスルーム：' + p.bathrooms + '室\n';
    body += '  トイレ：' + p.toilets + '室\n';
    body += '  ファミリー対応：' + famCountEmail + '室\n';
  }
  body += '============================\n';
  body += '合計金額（目安）：' + fmt(total) + '\n';
  body += '============================\n\n';
  body += '※ 発注品目は全' + numUnits + '室分の合算数量です。\n\n';
  body += '【発注品目】\n';

  // グレードグループ
  for (const g of GRADE_GROUPS) {
    const sel = state.gradeSelections[g.id];
    const qty = state.gradeQty[g.id]||0;
    if (sel && qty>0) {
      const opt = g.options.find(o=>o.grade===sel);
      if (opt) {
        const p = opt.items.reduce((s,i)=>s+i.price,0);
        body += '■ '+g.name+'（'+opt.label+'） x'+qty+'セット '+fmt(p*qty)+'\n';
        opt.items.forEach(i=>{ body += '  - ['+i.id+'] '+i.name+'\n'; });
      }
    }
  }
  // セット
  for (const [k,def] of Object.entries(SET_DEFS)) {
    const qty = state.setQty[k]||0;
    if (qty>0) {
      const p = def.items.reduce((s,i)=>s+(state.hostChoice[i.id]==='host'?0:i.price),0);
      body += '■ '+def.title+' x'+qty+'セット '+fmt(p*qty)+'\n';
      def.items.forEach(i=>{
        const hc = state.hostChoice[i.id]==='host'?'（ホスト様準備）':'';
        body += '  - ['+i.id+'] '+i.name+hc+'\n';
      });
    }
  }
  // 選択カード
  for (const [k,def] of Object.entries(CHOICE_DEFS)) {
    const sel = state.choiceSelections[k];
    const qty = state.choiceQty[k]||0;
    if (sel && qty>0) {
      const opt = def.opts.find(o=>o.key===sel);
      if (opt) body += '■ '+def.title+'（'+opt.label+'） x'+qty+' '+fmt(opt.price*qty)+'\n';
    }
  }
  // 通常品目
  for (const [id,qty] of Object.entries(state.quantities)) {
    if (qty<=0) continue;
    const item = ITEMS[id];
    if (item) {
      const hc = state.hostChoice[id]==='host'?'（ホスト様準備）':'';
      body += '■ ['+id+'] '+item.name+hc+' x'+qty+item.unit+' '+fmt(item.price*qty)+'\n';
    }
  }

  body += '\n============================\n';
  body += '送信日時：' + new Date().toLocaleString('ja-JP') + '\n';

  // 件名：複数物件の場合は「物件番号一覧（N室）」、単一なら「物件番号」のみ
  const subjectNumbers = units.map(u => u.number||'').filter(Boolean).join('・');
  const subjectLabel = isMulti ? (subjectNumbers + '（' + numUnits + '室）') : subjectNumbers;
  const subject = encodeURIComponent('【発注】' + (p.owner||'') + ' / ' + subjectLabel + ' 初回セット・補充備品');
  const bodyEnc = encodeURIComponent(body);
  const mailto = 'mailto:customer@bizpato.com?cc=' + encodeURIComponent(p.email) + '&subject=' + subject + '&body=' + bodyEnc;
  // 送信済みとして物件番号を記録
  markAsSubmitted(allNumbers);

  window.location.href = mailto;

  // 送信完了画面へ
  setTimeout(function() {
    document.getElementById('main-content').innerHTML = `
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:16px">📧</div>
        <div style="font-size:22px;font-weight:800;margin-bottom:8px">メールアプリが起動しました</div>
        <div style="color:var(--text-sub);font-size:13px;margin-bottom:24px">内容を確認して送信してください</div>
        <div style="background:var(--bg);border-radius:var(--radius);padding:16px;text-align:left">
          <div style="font-size:11px;color:var(--text-sub)">送信先</div>
          <div style="font-weight:700;margin-bottom:8px;font-family:var(--mono)">customer@bizpato.com</div>
          <div style="font-size:11px;color:var(--text-sub)">ご契約者</div>
          <div style="font-weight:700;margin-bottom:8px">${p.owner||''}</div>
          <div style="font-size:11px;color:var(--text-sub)">物件番号${isMulti?'（'+numUnits+'室）':''}</div>
          <div style="font-weight:700;margin-bottom:8px;font-family:var(--mono)">${subjectNumbers}</div>
          <div style="font-size:11px;color:var(--text-sub)">合計金額（目安）</div>
          <div style="font-size:24px;font-weight:900;font-family:var(--mono);color:var(--brand)">${fmt(total)}</div>
        </div>
      </div>`;
    const btnArea = document.getElementById('nav-btns-area');
    if (btnArea) btnArea.innerHTML = '';
  }, 800);
}

async function submitOrder() {
  if (!state.webhookUrl){showToast('Webhook URLが設定されていません');return;}
  const btn = document.getElementById('btn-submit');
  btn.textContent='送信中…';btn.disabled=true;
  const items = [];
  for (const g of GRADE_GROUPS) {
    const sel = state.gradeSelections[g.id];
    const qty = state.gradeQty[g.id]||0;
    if (sel && qty>0) {
      const opt = g.options.find(o=>o.grade===sel);
      if (opt) opt.items.forEach(i=>items.push({id:i.id,name:i.name,qty,price:i.price,category:g.name,grade:sel}));
    }
  }
  for (const [k,def] of Object.entries(SET_DEFS)) {
    const qty = state.setQty[k]||0;
    if (qty>0) def.items.forEach(i=>items.push({id:i.id,name:i.name,qty,price:i.price,category:def.title,setKey:k,hostChoice:state.hostChoice[i.id]||'us'}));
  }
  for (const [k,def] of Object.entries(CHOICE_DEFS)) {
    const sel = state.choiceSelections[k];
    const qty = state.choiceQty[k]||0;
    if (sel && qty>0) {
      const opt = def.opts.find(o=>o.key===sel);
      if (opt) {
        if (opt.ids[0]==='MUJI_citrus'||opt.ids[0]==='MUJI_woody') {
          items.push({id:opt.ids[0],name:def.title+'（'+opt.label+'）',qty,price:opt.price,category:def.title});
        } else {
          opt.ids.forEach(id=>{ const item=ITEMS[id]; if(item) items.push({id,name:item.name,qty,price:item.price,category:def.title,choice:sel}); });
        }
      }
    }
  }
  for (const [id,qty] of Object.entries(state.quantities)) {
    if (qty<=0) continue;
    const item = ITEMS[id];
    if (item) items.push({id,name:item.name,qty,unit:item.unit,price:item.price,hostChoice:state.hostChoice[id]||'us'});
  }
  const payload = {submittedAt:new Date().toISOString(),property:state.property,totalAmount:calcTotal(),items,gradeSelections:state.gradeSelections,choiceSelections:state.choiceSelections};
  try {
    await fetch(state.webhookUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    document.getElementById('main-content').innerHTML = `<div style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:16px">📦</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:8px">発注完了しました！</div>
      <div style="color:var(--text-sub);font-size:13px;margin-bottom:24px">Slackに通知が届きます</div>
      <div style="background:var(--bg);border-radius:var(--radius);padding:16px;text-align:left">
        <div style="font-size:11px;color:var(--text-sub)">物件名</div>
        <div style="font-weight:700;margin-bottom:8px">${state.property.name}</div>
        <div style="font-size:11px;color:var(--text-sub)">合計金額（目安）</div>
        <div style="font-size:24px;font-weight:900;font-family:var(--mono);color:var(--accent)">${fmt(calcTotal())}</div>
      </div>
    </div>`;
    document.getElementById('btn-submit').remove();
  } catch(e) {
    showToast('送信エラーが発生しました');
    btn.textContent='📦 この内容で発注する';btn.disabled=false;
  }
}




// ─── イベントハンドラ ───

// ── 数量プルダウン変更ハンドラ ──
function setQtyDirect(id, val) {
  const q = parseInt(val, 10) || 1;
  state.quantities[id] = q;
  render();
}
function setGradeRefillQtyDirect(gid, val) {
  const q = parseInt(val, 10) || 1;
  if (!state.gradeRefillQty) state.gradeRefillQty = {};
  state.gradeRefillQty[gid] = q;
  render();
}
function setSetRefillQtyDirect(key, val) {
  const q = parseInt(val, 10) || 1;
  if (!state.setRefillQty) state.setRefillQty = {};
  state.setRefillQty[key] = q;
  render();
}
function setGradeQtyDirect(gid, val) {
  const q = parseInt(val, 10) || 1;
  state.gradeQty[gid] = q;
  render();
}
function setSetQtyDirect(k, val) {
  const q = parseInt(val, 10) || 1;
  state.setQty[k] = q;
  render();
}
function setChoiceQtyDirect(key, val) {
  const q = parseInt(val, 10) || 1;
  state.choiceQty[key] = q;
  const opt = CHOICE_DEFS[key]?.opts.find(o=>o.key===state.choiceSelections[key]);
  if (opt) opt.ids.forEach(id => { if (ITEMS[id]) state.quantities[id] = q * (ITEMS[id].min||1); });
  render();
}
function changeRefillQtyDirect(key, val) {
  const newQty = parseInt(val, 10);
  if (isNaN(newQty) || newQty < 1) return;
  state.refillQty[key] = newQty;
  const def = REFILL_CHOICE_DEFS[key];
  const opt = def.opts.find(function(o){return o.key===state.refillChoices[key];});
  def.opts.forEach(function(o) { if(o.extraId) state.quantities[o.extraId] = 0; });
  state.quantities[def.base.id] = newQty;
  if (opt && opt.extraId) state.quantities[opt.extraId] = newQty;
  saveState();
  render();
}
function addToCart(type, key, qty) {
  const q = parseInt(qty, 10) || 1;
  if (!state.cartAdded) state.cartAdded = {};
  if (!state.confirmedSelections) state.confirmedSelections = {};
  if (!state.confirmedQty) state.confirmedQty = {};
  if (!state.confirmedSetQty) state.confirmedSetQty = {};
  if (type === 'item') {
    state.quantities[key] = q;
    state.cartAdded[key] = true;
    state.confirmedQty[key] = q;
  } else if (type === 'grade') {
    state.gradeQty[key] = q;
    state.cartAdded['grade_'+key] = true;
    state.confirmedSelections['grade_'+key] = state.gradeSelections[key];
    if (!state.confirmedGradeQty) state.confirmedGradeQty = {};
    state.confirmedGradeQty[key] = q;
  } else if (type === 'set') {
    state.setQty[key] = q;
    state.cartAdded['set_'+key] = true;
    state.confirmedSetQty[key] = q;
  } else if (type === 'choice') {
    state.choiceQty[key] = q;
    const opt = CHOICE_DEFS[key]?.opts.find(o=>o.key===state.choiceSelections[key]);
    if (opt) opt.ids.forEach(id => { if (ITEMS[id]) state.quantities[id] = q * (ITEMS[id].min||1); });
    state.cartAdded['choice_'+key] = true;
    state.confirmedSelections['choice_'+key] = state.choiceSelections[key];
    if (!state.confirmedChoiceQty) state.confirmedChoiceQty = {};
    state.confirmedChoiceQty[key] = q;
  } else if (type === 'refill') {
    state.refillQty[key] = q;
    const def = REFILL_CHOICE_DEFS[key];
    if (def) {
      if (def.base?.id) state.quantities[def.base.id] = q;
      const sel = state.refillChoices[key];
      const opt = def.opts?.find(o=>o.key===sel);
      if (opt?.extraId) state.quantities[opt.extraId] = q;
    }
    state.cartAdded['refill_'+key] = true;
    state.confirmedSelections['refill_'+key] = state.refillChoices[key];
    if (!state.confirmedRefillQty) state.confirmedRefillQty = {};
    state.confirmedRefillQty[key] = q;
    // kids_shampooの詰替数量も確定値に保存
    if (!state.confirmedSetRefillQty) state.confirmedSetRefillQty = {};
    state.confirmedSetRefillQty[key] = (state.setRefillQty||{})[key] ?? 1;
  }
  render();
}
// ── カートから削除 ──
function removeFromCart(type, key) {
  if (!state.cartAdded) state.cartAdded = {};
  if (type === 'item') {
    state.quantities[key] = 1;
    delete state.cartAdded[key];
  } else if (type === 'grade') {
    state.gradeQty[key] = 1;
    delete state.cartAdded['grade_'+key];
  } else if (type === 'set') {
    state.setQty[key] = 1;
    delete state.cartAdded['set_'+key];
  } else if (type === 'choice') {
    state.choiceQty[key] = 1;
    const opt = CHOICE_DEFS[key]?.opts.find(o=>o.key===state.choiceSelections[key]);
    if (opt) opt.ids.forEach(id => { if (ITEMS[id]) state.quantities[id] = ITEMS[id].min||1; });
    delete state.cartAdded['choice_'+key];
  } else if (type === 'refill') {
    state.refillQty[key] = 1;
    const def = REFILL_CHOICE_DEFS[key];
    if (def) {
      if (def.base?.id) state.quantities[def.base.id] = 1;
      const sel = state.refillChoices[key];
      const opt = def.opts?.find(o=>o.key===sel);
      if (opt?.extraId) state.quantities[opt.extraId] = 1;
    }
    delete state.cartAdded['refill_'+key];
  }
  render();
}
// ── 数量プルダウンHTML生成ヘルパー ──
function qtySelectHTML(type, key, qty, unit, max) {
  max = max || 20;
  let opts = '';
  for (let i = 1; i <= max; i++) {
    opts += '<option value="' + i + '"' + (qty === i ? ' selected' : '') + '>' + i + '</option>';
  }
  return '<select class="qty-select" onchange="setQtyDirect(\'' + key + '\', this.value)" onclick="event.stopPropagation()">' + opts + '</select><span class="qty-label">' + unit + '</span>';
}

function changeQty(id, delta) {
  const item = ITEMS[id];
  const step = item ? item.min : 1;
  const cur = state.quantities[id] || 0;
  state.quantities[id] = Math.max(0, cur + delta * step);
  render();
}
function changeGradeQty(gid, delta) {
  state.gradeQty[gid] = Math.max(0, (state.gradeQty[gid]||0) + delta);
  render();
}
function setGrade(gid, grade) {
  state.gradeSelections[gid] = grade;
  // ボトルの有無に応じて数量を設定
  const g = GRADE_GROUPS.find(g=>g.id===gid);
  const opt = g ? g.options.find(o=>o.grade===grade) : null;
  const hasBottle = opt && opt.items.some(i=>i.id.startsWith('B'));
  const baths = parseInt(state.property && state.property.bathrooms) || 0;
  const AUTO_GRADE_IDS = ['shampoo','conditioner','bodysoap'];
  if (AUTO_GRADE_IDS.includes(gid)) {
    state.gradeQty[gid] = (hasBottle && baths > 0) ? baths : 1;
    state.confirmedGradeQty[gid] = state.gradeQty[gid];
  } else {
    if (!(state.gradeQty[gid] > 0)) state.gradeQty[gid] = 1;
  }
  // 必須グレード品目はcartAddedを自動セット
  // ※ confirmedSelectionsはここでは更新しない（addToCart時のみ更新）
  // こうすることでタブ切替→sel !== confirmedSel → 「変更する」ボタンが表示される
  if (g && (g.req === true || g.req === '必須')) {
    if (!state.cartAdded) state.cartAdded = {};
    state.cartAdded['grade_'+gid] = true;
  }
  render();
}
function changeSetQty(k, delta) {
  state.setQty[k] = Math.max(0, (state.setQty[k]||0) + delta);
  render();
}
function selectChoice(key, optKey) {
  const prev = state.choiceSelections[key];
  // 前の選択の数量を消す
  if (prev) {
    const prevOpt = CHOICE_DEFS[key].opts.find(o=>o.key===prev);
    if (prevOpt) prevOpt.ids.forEach(id => { state.quantities[id] = 0; });
  }
  state.choiceSelections[key] = optKey;
  const opt = CHOICE_DEFS[key].opts.find(o=>o.key===optKey);
  const isReqItem = CHOICE_DEFS[key].req === true;

  // スリッパ：タブ切り替え時に数量を選択肢に応じてリセット
  if (key === 'slipper') {
    if (optKey === 'vinyl') {
      // ビニール → 最大宿泊人数分（設定済みなら）
      const maxG = parseInt(state.property && state.property.maxGuests) || 0;
      state.choiceQty[key] = maxG > 0 ? maxG : 1;
    } else {
      // 使い捨て → 数量1にリセット
      state.choiceQty[key] = 1;
    }
    // 変更ボタンを出すためにconfirmedChoiceQtyをリセット
    if (!state.confirmedChoiceQty) state.confirmedChoiceQty = {};
    delete state.confirmedChoiceQty[key];
  }

  if (opt) {
    if (key !== 'slipper') {
      // スリッパ以外のデフォルト数量セット
      if (!isReqItem) {
        if (!(state.choiceQty[key] > 0)) state.choiceQty[key] = 1;
      } else if (opt.min) {
        if (!(state.choiceQty[key] > 0)) state.choiceQty[key] = opt.min;
      } else {
        if (!(state.choiceQty[key] > 0)) state.choiceQty[key] = 1;
      }
    }
    // 紐付くIDの数量を同期
    opt.ids.forEach(id => {
      if (ITEMS[id]) {
        state.quantities[id] = state.choiceQty[key] * (ITEMS[id].min || 1);
      }
    });
    // 必須品目は選択後にcartAddedを自動セット
    if (isReqItem) {
      if (!state.cartAdded) state.cartAdded = {};
      state.cartAdded['choice_'+key] = true;
    }
  }
  render();
}
function changeChoiceQty(key, delta) {
  const opt = CHOICE_DEFS[key].opts.find(o=>o.key===state.choiceSelections[key]);
  if (!opt) return;
  const step = opt.min || 1;
  const newQty = Math.max(0, (state.choiceQty[key]||0) + delta * step);
  state.choiceQty[key] = newQty;
  opt.ids.forEach(id => { if (ITEMS[id]) state.quantities[id] = newQty; });
  render();
}
function setHostChoice(id, val) {
  state.hostChoice[id] = val;
  const item = ITEMS[id];
  if (val === 'host') {
    state.quantities[id] = 0;
    if (state.confirmedQty) delete state.confirmedQty[id];
  } else {
    if (item) state.quantities[id] = item.min;
    if (item && (item.req === '必須' || item.req === 'ファミリー必須')) {
      // 弊社に戻したらconfirmedQtyを復元（カート投入済み表示）
      if (!state.confirmedQty) state.confirmedQty = {};
      state.confirmedQty[id] = item.min;
    }
  }
  render();
}
function setSetHostChoice(setKey, itemId, val) {
  state.hostChoice[itemId] = val;
  // セット全体のhostRemovedフラグを管理（セット内の全品目がhost→削除済み）
  const def = SET_DEFS[setKey];
  if (def) {
    const allHost = def.items.every(i => state.hostChoice[i.id] === 'host');
    if (!state.hostRemoved) state.hostRemoved = {};
    if (allHost) state.hostRemoved['set_'+setKey] = true;
    else delete state.hostRemoved['set_'+setKey];
  }
  render();
}

// ─── 合計計算 ───
function calcTotal() {
  let total = 0;

  // GRADE/CHOICE/REFILL/SETの内部品番セットを作成（二重計上防止）
  const managedIds = new Set();
  for (const g of GRADE_GROUPS) {
    g.options.forEach(opt => opt.items.forEach(i => managedIds.add(i.id)));
  }
  for (const [key, def] of Object.entries(CHOICE_DEFS)) {
    (def.opts||[]).forEach(opt => (opt.ids||[]).forEach(id => managedIds.add(id)));
  }
  for (const [key, def] of Object.entries(REFILL_CHOICE_DEFS)) {
    if (def.base?.id) managedIds.add(def.base.id);
    (def.opts||[]).forEach(opt => { if (opt.extraId) managedIds.add(opt.extraId); });
  }
  for (const [key, def] of Object.entries(SET_DEFS)) {
    (def.items||[]).forEach(i => managedIds.add(i.id));
  }

  // 通常品目（managedIds以外）：hostChoice='us'かつqty>0
  for (const [id, qty] of Object.entries(state.quantities)) {
    if (qty <= 0) continue;
    if (managedIds.has(id)) continue;
    if (state.hostChoice[id] === 'host') continue;
    const item = ITEMS[id];
    if (!item) continue;
    total += item.price * qty;
  }
  // グレードグループ：選択済みなら計上
  for (const g of GRADE_GROUPS) {
    const sel = state.gradeSelections[g.id];
    const qty = state.gradeQty[g.id] || 0;
    if (sel && qty > 0) {
      const opt = g.options.find(o=>o.grade===sel);
      if (opt) {
        const bodyItems2 = opt.items.filter(i => i.id.startsWith('B') || (i.name||'').includes('ボトル') || (i.name||'').includes('ディスペンサー'));
        const refillItems2 = opt.items.filter(i => !bodyItems2.includes(i));
        const mainItems2 = bodyItems2.length > 0 ? bodyItems2 : opt.items;
        const subItems2 = bodyItems2.length > 0 ? refillItems2 : [];
        const rQty = bodyItems2.length > 0 ? ((state.gradeRefillQty||{})[g.id] ?? 1) : qty;
        total += mainItems2.reduce((s,i)=>s+i.price,0) * qty + subItems2.reduce((s,i)=>s+i.price,0) * rQty;
      }
    }
  }
  // セット：qty>0なら計上（hostChoice考慮）
  for (const [k, def] of Object.entries(SET_DEFS)) {
    const qty = state.setQty[k] || 0;
    if (qty <= 0) continue;
    const p = def.items.reduce((s,i)=>s+(state.hostChoice[i.id]==='host'?0:i.price),0);
    total += p * qty;
  }
  // choiceQty：選択済みなら計上
  for (const [key, qty] of Object.entries(state.choiceQty || {})) {
    if (qty <= 0) continue;
    const def = CHOICE_DEFS[key];
    if (!def) continue;
    const sel = state.choiceSelections[key];
    const opt = def.opts?.find(o=>o.key===sel);
    if (!opt) continue;
    total += (opt.price || 0) * qty;
  }
  // refillQty：選択済みなら計上
  for (const [key, qty] of Object.entries(state.refillQty || {})) {
    if (qty <= 0) continue;
    const def = REFILL_CHOICE_DEFS[key];
    if (!def) continue;
    const sel = state.refillChoices[key];
    const opt = def.opts?.find(o=>o.key===sel);
    if (opt) {
      const basePrice = def.base ? def.base.price : 0;
      const extraPrice = opt.extraPrice || 0;
      total += (basePrice + extraPrice) * qty;
    } else if (def.base) {
      total += def.base.price * qty;
    }
  }
  return total;
}

function selectRefill(key, optKey) {
  const def = REFILL_CHOICE_DEFS[key];
  const isReqRefill = (def.req === '必須' || def.req === 'ファミリー必須');
  state.refillChoices[key] = optKey;
  // kids_shampoo: 詰替のみに切り替え→数量1にリセット、本体+詰替→バスルーム数
  if (key === 'kids_shampoo') {
    const baths = parseInt(state.property && state.property.bathrooms) || 0;
    if (optKey === 'refill_only') {
      state.refillQty[key] = 1;
    } else if (optKey === 'with_body' && baths > 0) {
      state.refillQty[key] = baths;
    } else {
      if (!(state.refillQty[key] > 0)) state.refillQty[key] = 1;
    }
    // ファミリー必須なのでcartAddedをセット
    if (!state.cartAdded) state.cartAdded = {};
    state.cartAdded['refill_kids_shampoo'] = true;
    if (!state.confirmedSelections) state.confirmedSelections = {};
    if (state.confirmedSelections['refill_kids_shampoo'] === undefined) {
      state.confirmedSelections['refill_kids_shampoo'] = optKey;
    }
    if (!state.confirmedRefillQty) state.confirmedRefillQty = {};
    if (state.confirmedRefillQty['kids_shampoo'] === undefined) {
      state.confirmedRefillQty['kids_shampoo'] = state.refillQty[key];
    }
  } else if (isReqRefill) {
    if (!(state.refillQty[key] > 0)) state.refillQty[key] = 1;
    // ファミリー必須はcartAddedを自動セット
    if (!state.cartAdded) state.cartAdded = {};
    state.cartAdded['refill_'+key] = true;
  } else {
    if (!(state.refillQty[key] > 0)) state.refillQty[key] = 0;
  }
  def.opts.forEach(function(o) {
    if (o.extraId) state.quantities[o.extraId] = 0;
  });
  state.quantities[def.base.id] = state.refillQty[key];
  const opt = def.opts.find(function(o){return o.key===optKey;});
  if (opt && opt.extraId) state.quantities[opt.extraId] = state.refillQty[key];
  render();
}

function changeRefillQty(key, delta) {
  const newQty = Math.max(0, (state.refillQty[key]||0) + delta);
  state.refillQty[key] = newQty;
  const def = REFILL_CHOICE_DEFS[key];
  const opt = def.opts.find(function(o){return o.key===state.refillChoices[key];});
  def.opts.forEach(function(o) { if(o.extraId) state.quantities[o.extraId] = 0; });
  state.quantities[def.base.id] = newQty;
  if (opt && opt.extraId) state.quantities[opt.extraId] = newQty;
  render();
}


function gradeGroupHTML(g) {

  const NI = NO_IMG_SM;

      <img style="width:52px;height:52px;border-radius:8px;object-fit:contain;background:#fff;border:1px solid #e8edf2;flex-shrink:0" src="${src}" onerror="this.onerror=null;this.src='${NI}'" referrerpolicy="no-referrer" loading="lazy">
      <div style="flex:1">
        <div style="font-size:9px;font-family:var(--mono);color:#94a3b8">${item.id} <span style="color:var(--text-sub)">本体</span></div>

          <div style="font-size:12px;font-weight:700;flex:1;min-width:0">${item.name}</div>
          <div style="flex-shrink:0;font-size:13px;font-weight:900;font-family:var(--mono);color:var(--brand)">${fmt(item.price)}</div>
        </div>
        ${ITEMS[item.id] ? `<div style="font-size:10px;font-weight:600;color:#94a3b8;margin-top:1px">${ITEMS[item.id].brand}</div>` : ""}
      </div>
    </div>`;
  }).join('');

  const subHTML = subItems.length > 0
    ? (bodyItems.length > 0
        ? `<div style="margin-left:16px;border-left:2px solid #e8edf2;padding-left:12px">${subItems.map(item => {
            const src = ITEMS[item.id]?.img || NI;
            return `<div style="display:flex;align-items:center;gap:8px;padding:6px;background:var(--bg);border-radius:8px;margin-bottom:4px">
              <img style="width:40px;height:40px;border-radius:6px;object-fit:contain;background:#fff;border:1px solid #e8edf2;flex-shrink:0" src="${src}" onerror="this.onerror=null;this.src='${NI}'" referrerpolicy="no-referrer" loading="lazy">
              <div style="flex:1">
                <div style="font-size:9px;font-family:var(--mono);color:#94a3b8">${item.id} <span style="color:var(--text-sub)">詰替</span></div>
                <div style="display:flex;align-items:baseline;justify-content:space-between;gap:6px">
                  <div style="font-size:11px;font-weight:600;flex:1;min-width:0">${item.name}</div>
                  <div style="flex-shrink:0;font-size:12px;font-weight:800;font-family:var(--mono);color:var(--brand)">${fmt(item.price)}</div>
                </div>
                ${ITEMS[item.id] ? `<div style="font-size:10px;font-weight:600;color:#94a3b8;margin-top:1px">${ITEMS[item.id].brand}</div>` : ""}
              </div>
            </div>`;
          }).join('')}</div>`
        // 詰替のみ（パンテーン等）→インデントなしで表示
        : subItems.map(item => {
            const src = ITEMS[item.id]?.img || opt.img || NI;
            return `<div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg);border-radius:10px;margin-bottom:6px">
              <img style="width:52px;height:52px;border-radius:8px;object-fit:contain;background:#fff;border:1px solid #e8edf2;flex-shrink:0" src="${src}" onerror="this.onerror=null;this.src='${NI}'" referrerpolicy="no-referrer" loading="lazy">
              <div style="flex:1">
                <div style="font-size:9px;font-family:var(--mono);color:#94a3b8">${item.id} <span style="color:var(--text-sub)">詰替</span></div>
                <div style="display:flex;align-items:baseline;justify-content:space-between;gap:6px">
                  <div style="font-size:12px;font-weight:700;flex:1;min-width:0">${item.name}</div>

    : '';
  return `<div class="grade-card ${qty>0?'selected':''}">
    <div class="badge-row" style="margin-bottom:6px">${reqBadgeG}</div>

    <div style="display:flex;align-items:flex-start;gap:8px;margin-top:10px">
      <div style="flex:1;min-width:0">

        ${subHTML}
        ${opt.hostNote?`<div class="host-note" style="margin-top:6px">${opt.hostNote}</div>`:''}
        <div style="padding-top:8px;border-top:1px solid #e8edf2;margin-top:8px"><span style="font-size:11px;font-weight:600;margin-right:4px;color:var(--brand)">合計</span><span style="font-size:16px;font-weight:900;font-family:var(--mono);color:var(--brand)">${fmt(totalP)}</span></div>

        ${(()=>{
          // 本体セレクト（bodyItemsがある場合のみ）
          const _rQty = (state.gradeRefillQty||{})[g.id] ?? 1;
          const _confirmedRQty = (state.confirmedGradeQty||{})['refill_'+g.id] ?? 1;
          const _addedG = (state.cartAdded||{})['grade_'+g.id];
          const _confirmedSelG = (state.confirmedSelections||{})['grade_'+g.id];
          const _confirmedQtyG = (state.confirmedGradeQty||{})[g.id];
          const _selChangedG = _addedG && _confirmedSelG !== undefined && sel !== _confirmedSelG;
          const _qtyChangedG = _addedG && _confirmedQtyG !== undefined && (qty !== _confirmedQtyG || _rQty !== _confirmedRQty);
          // ハンドソープは室数連動、shampoo/conditioner/bodysoapはバス数連動
          const _gradeNumUnits = (state.property && state.property.units && state.property.units.length) || 1;
          const _gradeIsHandsoap = g.id === 'handsoap';
          // バス数連動バッジ
          const _bodySubLabelBath = isAutoGrade ? '<span class="qty-row-label-sub">バス数連動</span>' : '';
          // 室数連動バッジ（handsoapのみ、1室時は非表示）
          const _bodySubLabelRoom = (_gradeIsHandsoap && _gradeNumUnits > 1) ? '<span class="qty-row-label-sub">室数連動</span>' : '';
          let html2 = '';
          if (bodyItems.length > 0 && subItems.length > 0) {
            // 本体＋詰替 両方ある場合
            let bodyOpts=''; for(let i=1;i<=20;i++) bodyOpts+='<option value="'+i+'"'+(qty===i?' selected':'')+'>'+i+'</option>';
            const bodySubLabel = _bodySubLabelBath || _bodySubLabelRoom;

            let refillOpts=''; for(let i=1;i<=20;i++) refillOpts+='<option value="'+i+'"'+(_rQty===i?' selected':'')+'>'+i+'</option>';
            html2 += '<div class="qty-row"><div class="qty-row-label"><span class="qty-row-label-main">詰替数量</span></div><select class="qty-select" onchange="setGradeRefillQtyDirect(\''+g.id+'\',this.value)">'+refillOpts+'</select></div>';
          } else if (bodyItems.length > 0 && subItems.length === 0) {
            // 本体のみ
            let bodyOpts=''; for(let i=1;i<=20;i++) bodyOpts+='<option value="'+i+'"'+(qty===i?' selected':'')+'>'+i+'</option>';
            const bodySubLabel = _bodySubLabelBath || _bodySubLabelRoom;
            html2 += '<div class="qty-row"><div class="qty-row-label"><span class="qty-row-label-main">本体数量</span>'+bodySubLabel+'</div><select class="qty-select" onchange="setGradeQtyDirect(\''+g.id+'\',this.value)">'+bodyOpts+'</select></div>';
          } else if (!bodyItems.length && subItems.length > 0) {
            // 詰替のみ（パンテーン等）
            let soloOpts=''; for(let i=1;i<=20;i++) soloOpts+='<option value="'+i+'"'+(qty===i?' selected':'')+'>'+i+'</option>';
            html2 += '<div class="qty-row"><div class="qty-row-label"><span class="qty-row-label-main">詰替数量</span></div><select class="qty-select" onchange="setGradeQtyDirect(\''+g.id+'\',this.value)">'+soloOpts+'</select></div>';
          } else {
            // 品目未分類（念のため）
            let soloOpts=''; for(let i=1;i<=20;i++) soloOpts+='<option value="'+i+'"'+(qty===i?' selected':'')+'>'+i+'</option>';
            html2 += '<div class="qty-row"><div class="qty-row-label"><span class="qty-row-label-main">数量</span></div><select class="qty-select" onchange="setGradeQtyDirect(\''+g.id+'\',this.value)">'+soloOpts+'</select></div>';
          }
          if (!_addedG) {
            html2 += '<button class="btn-add-cart" onclick="addToCart(\'grade\',\''+g.id+'\','+qty+')">カートに入れる</button>';
          } else if (_selChangedG || _qtyChangedG) {
            html2 += '<button class="btn-add-cart" onclick="addToCart(\'grade\',\''+g.id+'\','+qty+')">変更する</button>';
          } else {
            html2 += '<span style="font-size:11px;color:#10b981;font-weight:700;white-space:nowrap">✓ カート投入済み</span>';
          }
          return html2;
        })()}
      </div>
    </div>
  </div>`;
}

function renderDashboard() {
  const allRequired = REQUIRED_STEPS.every(s => state.completedSteps[s.key]);
  // ファミリー物件の場合はファミリー必須・任意の完了も必要
  const familyRequired = state.property.isFamily === true
    ? (state.completedSteps['family'] && state.completedSteps['family_opt'])
    : true;
  const canSubmit = state.completedSteps['fixed'] && state.completedSteps['select1'] && state.completedSteps['select2'] && familyRequired;

  const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  function taskCard(step, isRequired, locked) {
    const done = state.completedSteps[step.key];
    const checkbox = done
      ? '<div class="task-card-checkbox"><div class="checkbox-done">' + CHECK_SVG + '</div></div>'
      : '<div class="task-card-checkbox"><div class="checkbox-empty"></div></div>';
    const cardClass = 'task-card' + (done ? ' done' : '') + (isRequired && !done ? ' required-card' : '') + (locked ? ' locked' : '');
    const subText = done
      ? '<div class="task-card-sub done-text">✓ 完了</div>'
      : locked
        ? '<div class="task-card-sub" style="color:#cbd5e1">物件情報の入力後にお進みいただけます</div>'
        : '<div class="task-card-sub">' + (isRequired ? '必須 ・ ' : '') + 'タップして入力</div>';
    const onclick = locked ? '' : 'onclick="openStep(\''+step.key+'\')"';
    return '<div ' + onclick + ' class="' + cardClass + '" style="' + (locked ? 'opacity:.45;cursor:not-allowed;pointer-events:none;' : '') + '">'
      + checkbox
      + '<div class="task-card-body"><div class="task-card-title">'+step.label+'</div>'
      + subText
      + '</div>'
      + '<div class="task-card-arrow" style="' + (locked ? 'color:#cbd5e1' : '') + '">›</div>'
      + '</div>';
  }

  function optCard(locked) {
    const anyDone = OPT_CATS.some(s => state.completedSteps[s.key]);
    const doneCnt = OPT_CATS.filter(s => state.completedSteps[s.key]).length;
    const checkbox = anyDone
      ? '<div class="task-card-checkbox"><div class="checkbox-done">' + CHECK_SVG + '</div></div>'
      : '<div class="task-card-checkbox"><div class="checkbox-empty"></div></div>';
    const subText = locked
      ? '<div class="task-card-sub" style="color:#cbd5e1">物件情報の入力後にお進みいただけます</div>'
      : '<div class="task-card-sub">'+(doneCnt > 0 ? '✓ '+doneCnt+'カテゴリ選択済み' : '全13カテゴリから選択')+'</div>';
    return '<div ' + (locked ? '' : 'onclick="openStep(\'optList\')"') + ' class="task-card'+(anyDone?' done':'')+(locked?' locked':'')+'" style="'+(locked?'opacity:.45;cursor:not-allowed;pointer-events:none;':'')+'">'
      + checkbox
      + '<div class="task-card-body"><div class="task-card-title">任意追加品目</div>'
      + subText
      + '</div>'
      + '<div class="task-card-arrow" style="' + (locked ? 'color:#cbd5e1' : '') + '">›</div>'
      + '</div>';

  // STEP完了状態の判定
  const familyDone = state.completedSteps['family'] && state.completedSteps['family_opt'];
  const step1Done = state.completedSteps['fixed'] && state.completedSteps['select1'] && state.completedSteps['select2'] && familyDone;
  const step1Partial = state.completedSteps['fixed'] || state.completedSteps['select1'] || state.completedSteps['select2'];
  const step2Done = state.completedSteps['recommend'];

    const color = done ? '#16a34a' : (partial ? '#92400e' : '#1e40af');

    return '<div style="display:inline-flex;align-items:center;gap:6px;background:'+bg+';border:1.5px solid '+border+';border-radius:99px;padding:5px 14px;margin-bottom:12px">'
      + '<span style="font-size:11px;font-weight:900;color:'+color+';letter-spacing:.12em">'+icon+'STEP '+num+'</span>'
      + '</div>';

  // STEPブロックのラッパー
  function stepBlock(num, done, partial, title, desc, cardsHtml) {

  // STEP1カード生成

  // STEP1のフロー説明

    ? '必須項目の入力が完了しました。'
    : state.property.isFamily === true
      ? '数量確認 → 担当設定 → 品目選択 → ファミリー品目の順にお進みください。'

  let html = '<div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:12px"><button class="btn-reset" onclick="showResetDialog()">🗑️ すべてリセット</button></div>';

  // ── 物件情報カード（ダッシュボード最上部）──
  const _propUnits = (state.property.units || []);
  const _propMultiple = _propUnits.length > 1;
  const _famCount = state.property.familyUnitCount || 0;
  // 概要：合算サマリーまたは単一物件の値

    ${[
      [_propMultiple ? '契約室数' : '物件番号', _propMultiple ? _propUnits.length + '室' : (_propUnits[0]?.number || '—')],
      ['最大宿泊人数', state.property.maxGuests ? state.property.maxGuests+'名'+(_propMultiple?'（合計）':'') : '—'],
      ['バスルーム', state.property.bathrooms ? state.property.bathrooms+'室'+(_propMultiple?'（合計）':'') : '—'],
      ['トイレ', state.property.toilets ? state.property.toilets+'室'+(_propMultiple?'（合計）':'') : '—'],
      ['ファミリー', _propMultiple ? (_famCount > 0 ? _famCount+'室' : 'なし') : (state.property.isFamily===true ? 'はい' : state.property.isFamily===false ? 'いいえ' : '—')],
    ].map(([label, val]) => `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:12px;text-align:center"><div style="font-size:10px;font-weight:900;color:#94a3b8;letter-spacing:.1em;margin-bottom:6px">${label}</div><div style="font-size:14px;font-weight:900;color:var(--brand)">${val}</div></div>`).join('')}
  </div>` : '';

  html += `<div style="background:${propComplete?'#f0f9ff':'#fff'};border:1.5px solid ${propComplete?'#bfdbfe':'#fca5a5'};border-radius:28px;overflow:hidden;margin-bottom:24px;box-shadow:0 1px 6px rgba(0,0,0,0.04)">
    <div style="background:#f8fafc;padding:18px 24px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:8px;font-size:15px;font-weight:900;color:#475569">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        物件情報${_propMultiple ? `<span style="font-size:11px;font-weight:700;color:#fff;background:var(--brand);border-radius:99px;padding:2px 10px;margin-left:4px">${_propUnits.length}室契約</span>` : ''}
      </div>
      <button onclick="openStep('propInfo')" style="font-size:11px;font-weight:900;color:var(--brand);background:none;border:1px solid #bfdbfe;border-radius:99px;padding:4px 12px;cursor:pointer">編集</button>
    </div>
    <div style="padding:18px 24px">
      ${propComplete
        ? _propSummaryRows
        : `<div class="alert-box alert-danger" style="margin:0;border-radius:14px;border-left-width:4px">
            <div class="alert-icon">!</div>
            <div style="flex:1;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
              <div>

              <button onclick="openStep('propInfo')" style="font-size:12px;font-weight:900;color:#fff;background:var(--danger);border:none;border-radius:99px;padding:8px 18px;cursor:pointer;margin-left:auto;flex-shrink:0">入力する →</button>

  // 発注内容を確認するボタン（STEP3の下に常設、完了前はグレーアウト）

    html += '<div style="margin-top:8px"><button onclick="openStep(\'confirm\')" class="btn-submit" style="width:100%;padding:16px;font-size:16px">📦 発注内容を確認する</button></div>';

  }

  // スティッキーバーは常に非表示
  setTimeout(function() {
    
  }, 50);

  
  return html;
}

function setFamilyProperty(val) {

    const familyReqIds = ['B0085','B0086','B0087','B0088'];
    familyReqIds.forEach(function(id) {

      if (item) {
        if (!(state.quantities[id] > 0)) state.quantities[id] = item.min || 1;
        if (!state.cartAdded) state.cartAdded = {};
        state.cartAdded[id] = true;
        if (!state.confirmedQty) state.confirmedQty = {};
        if (state.confirmedQty[id] === undefined) state.confirmedQty[id] = item.min || 1;
      }
    });
    // kids_shampooのREFILL選択が未設定なら初期化
    if (!state.refillQty) state.refillQty = {};
    if (!state.refillChoices) state.refillChoices = {};
    if (!state.refillQty['kids_shampoo']) state.refillQty['kids_shampoo'] = 1;
    saveState();
    render(true);
  } else {
    // いいえ → ファミリー品目をクリアして画面を再描画（確定ボタンで完了）
    const familyReqIds = ['B0085','B0086','B0087','B0088'];
    familyReqIds.forEach(function(id) {
      state.quantities[id] = 0;
      if (state.cartAdded) delete state.cartAdded[id];
    });
    // kids_shampooのREFILLをリセット
    if (state.refillQty) state.refillQty['kids_shampoo'] = 0;
    if (state.refillChoices) delete state.refillChoices['kids_shampoo'];
    if (state.cartAdded) delete state.cartAdded['refill_kids_shampoo'];
    saveState();
    render(true);
  }
}

// ─── ステップ描画 ───
function initDefaults() {
  // 非-hostPrep必須品目のデフォルト数量をセット
  const mandatoryIds = [
    'S0031','S0179','S0183','B0212','B0140','S0092',
    'B0085','B0086','B0087','B0088', // ファミリー必須食器
  ];
  mandatoryIds.forEach(function(id) {
    const item = ITEMS[id];
    if (!item) return;
    // 必須品目は常に数量・cartAdded・confirmedQtyを強制セット
    state.quantities[id] = item.min;
    if (!state.cartAdded) state.cartAdded = {};
    state.cartAdded[id] = true;
    if (!state.confirmedQty) state.confirmedQty = {};
    state.confirmedQty[id] = item.min;
  });
  // SET_DEFS 必須セットもcartAdded自動セット
  Object.keys(SET_DEFS).forEach(function(k) {
    const def = SET_DEFS[k];
    if (def && def.req === '必須') {
      if (!state.setQty[k]) state.setQty[k] = 1;
      if (!state.cartAdded) state.cartAdded = {};
      if (!state.cartAdded['set_'+k]) state.cartAdded['set_'+k] = true;
    }
  });
  // hostPrepアイテム：デフォルトは「弊社が自動補充（us）」
  Object.keys(ITEMS).forEach(function(id) {
    const item = ITEMS[id];
    if (item && item.hostPrep) {
      // hostChoiceが未設定なら「us（弊社）」をデフォルトにセット
      if (state.hostChoice[id] === undefined) {
        state.hostChoice[id] = 'us';
      }
      // 数量が未設定なら最小発注数をセット
      if (state.quantities[id] === undefined || state.quantities[id] === null) {
        state.quantities[id] = item.min;
      }
      // 全必須品目のconfirmedQtyを自動セット（弊社の場合のみ）
      if ((item.req === '必須' || item.req === 'ファミリー必須') && state.hostChoice[id] === 'us') {
        if (!state.confirmedQty) state.confirmedQty = {};
        if (state.confirmedQty[id] === undefined) state.confirmedQty[id] = item.min;
      }
    }
  });
  // SET_DEFS 必須セットもconfirmedSetQty自動セット
  Object.keys(SET_DEFS).forEach(function(k) {
    const def = SET_DEFS[k];
    if (def && def.req === '必須') {
      if (!state.setQty[k]) state.setQty[k] = 1;
      if (!state.confirmedSetQty) state.confirmedSetQty = {};
      if (state.confirmedSetQty[k] === undefined) state.confirmedSetQty[k] = 1;
    }
  });
  // CHOICE_DEFS全キー：未設定の場合はnullで初期化（localStorageの残存データ対策）
  Object.keys(CHOICE_DEFS).forEach(function(k) {
    if (!state.choiceSelections) state.choiceSelections = {};
    if (state.choiceSelections[k] === undefined) state.choiceSelections[k] = null;
    if (!state.choiceQty) state.choiceQty = {};
    if (state.choiceQty[k] === undefined) state.choiceQty[k] = 0;
  });
  // REFILL_CHOICE_DEFS全キー：未設定の場合はnullで初期化
  Object.keys(REFILL_CHOICE_DEFS).forEach(function(k) {
    if (!state.refillChoices) state.refillChoices = {};
    if (state.refillChoices[k] === undefined) state.refillChoices[k] = null;
    if (!state.refillQty) state.refillQty = {};
    if (state.refillQty[k] === undefined) state.refillQty[k] = 0;
  });

  // STEP2デフォルト選択肢（グローバル参照用）
  if (!window.STEP2_CHOICE_DEFAULTS) window.STEP2_CHOICE_DEFAULTS = {
    mizukiri: 'net', tissue: 'soft', toilet_deodor: 'lower', sanitary_bag: 's1',
    room_deodor: 'shi_set', slipper: 'vinyl', laundry: 'attackzero',
    dishsoap: 'pump', toilet_sheet: 'soujisheat', toothbrush: 'standard',
    gomibag45: 'smart', softener: 'with_bottle'
  };
  if (!window.STEP2_REFILL_DEFAULTS) window.STEP2_REFILL_DEFAULTS = {
    kabikiller: 'large', toilet_magic: 'spray', quickle: 'with_body'
  };
  if (!window.STEP2_GRADE_DEFAULTS) window.STEP2_GRADE_DEFAULTS = {
    shampoo: 'standard', conditioner: 'standard', bodysoap: 'bionote', handsoap: 'standard'
  };

  // STEP2（品目・メーカー選択）：未選択の場合は左端をデフォルト選択
  // 必須品目は常にcartAddedをセット。任意品目はSTEP2完了後のみ。
  var step2Completed = state.completedSteps && (state.completedSteps['select1'] || state.completedSteps['select2']);

  // CHOICE_DEFS
  var step2ChoiceDefaults = window.STEP2_CHOICE_DEFAULTS;
  Object.keys(step2ChoiceDefaults).forEach(function(k) {
    if (!state.choiceSelections[k]) {
      state.choiceSelections[k] = step2ChoiceDefaults[k];
      // スリッパのビニール選択時は最大宿泊人数をデフォルト数量に
      if (k === 'slipper' && step2ChoiceDefaults[k] === 'vinyl') {
        var maxG = parseInt(state.property && state.property.maxGuests) || 0;
        if (!state.choiceQty[k]) state.choiceQty[k] = maxG > 0 ? maxG : 1;
      } else {
        if (!state.choiceQty[k]) state.choiceQty[k] = 1;
      }
      var def = CHOICE_DEFS[k];
      var isReqChoice = def && def.req === true;
      if (def) {
        var opt = def.opts.find(function(o){ return o.key === step2ChoiceDefaults[k]; });
        if (opt && opt.ids) {
          opt.ids.forEach(function(id) {
            if (!state.quantities[id] || state.quantities[id] < 1) {
              state.quantities[id] = (ITEMS[id] && ITEMS[id].min) || 1;
            }
          });
        }
      }
      if (isReqChoice || step2Completed) {
        if (!state.cartAdded) state.cartAdded = {};
        state.cartAdded['choice_'+k] = true;
        if (!state.confirmedSelections) state.confirmedSelections = {};
        state.confirmedSelections['choice_'+k] = step2ChoiceDefaults[k];
        if (!state.confirmedChoiceQty) state.confirmedChoiceQty = {};
        if (state.confirmedChoiceQty[k] === undefined) {
          if (k === 'slipper' && step2ChoiceDefaults[k] === 'vinyl') {
            var maxG2 = parseInt(state.property && state.property.maxGuests) || 0;
            state.confirmedChoiceQty[k] = maxG2 > 0 ? maxG2 : 1;
          } else {
            state.confirmedChoiceQty[k] = 1;
          }
        }
      }
    }
  });
  // REFILL_CHOICE_DEFS（STEP2対象）
  var step2RefillDefaults = window.STEP2_REFILL_DEFAULTS;
  Object.keys(step2RefillDefaults).forEach(function(k) {
    if (!state.refillChoices[k]) {
      state.refillChoices[k] = step2RefillDefaults[k];
      if (!state.refillQty[k]) state.refillQty[k] = 1;
      var def = REFILL_CHOICE_DEFS[k];
      var isReqRefill = def && (def.req === '必須');
      if (def) {
        if (!state.quantities[def.base.id] || state.quantities[def.base.id] < 1) {
          state.quantities[def.base.id] = def.base.min || 1;
        }
        var opt = def.opts.find(function(o){ return o.key === step2RefillDefaults[k]; });
        if (opt && opt.extraId) {
          if (!state.quantities[opt.extraId] || state.quantities[opt.extraId] < 1) {
            state.quantities[opt.extraId] = (ITEMS[opt.extraId] && ITEMS[opt.extraId].min) || 1;
          }
        }
      }
      if (isReqRefill || step2Completed) {
        if (!state.cartAdded) state.cartAdded = {};
        state.cartAdded['refill_'+k] = true;
        if (!state.confirmedSelections) state.confirmedSelections = {};
        state.confirmedSelections['refill_'+k] = step2RefillDefaults[k];
        if (!state.confirmedRefillQty) state.confirmedRefillQty = {};
        if (state.confirmedRefillQty[k] === undefined) state.confirmedRefillQty[k] = 1;
      }
    }
  });
  // GRADE_GROUPS
  var step2GradeDefaults = window.STEP2_GRADE_DEFAULTS;
  Object.keys(step2GradeDefaults).forEach(function(k) {
    if (!state.gradeSelections) state.gradeSelections = {};
    if (!state.gradeQty) state.gradeQty = {};
    if (!state.gradeSelections[k]) {
      state.gradeSelections[k] = step2GradeDefaults[k];
      if (!state.gradeQty[k]) state.gradeQty[k] = 1;
      if (!state.gradeRefillQty) state.gradeRefillQty = {};
      if (state.gradeRefillQty[k] === undefined) state.gradeRefillQty[k] = 1;
      var grp = GRADE_GROUPS.find(function(g){ return g.id === k; });
      var isReqGrade = grp && grp.req === '必須';
      if (grp) {
        var opt = grp.options.find(function(o){ return o.grade === step2GradeDefaults[k]; });
        if (opt && opt.items) {
          opt.items.forEach(function(item) {
            if (!state.quantities[item.id] || state.quantities[item.id] < 1) {
              state.quantities[item.id] = (ITEMS[item.id] && ITEMS[item.id].min) || 1;
            }
          });
        }
      }
      if (isReqGrade || step2Completed) {
        if (!state.cartAdded) state.cartAdded = {};
        state.cartAdded['grade_'+k] = true;
        if (!state.confirmedSelections) state.confirmedSelections = {};
        state.confirmedSelections['grade_'+k] = step2GradeDefaults[k];
        if (!state.confirmedGradeQty) state.confirmedGradeQty = {};
        if (state.confirmedGradeQty[k] === undefined) state.confirmedGradeQty[k] = 1;
      }
    }
  });
  // kids_shampoo（ファミリー必須）：選択済みならcartAddedをセット、未選択はwith_bodyをデフォルト設定
  if (!state.refillChoices) state.refillChoices = {};
  if (!state.refillChoices['kids_shampoo']) {
    state.refillChoices['kids_shampoo'] = 'with_body';
    if (!state.refillQty) state.refillQty = {};
    if (!state.refillQty['kids_shampoo']) state.refillQty['kids_shampoo'] = 1;
    // 本体・詰替の数量を初期化
    const _kidsDef = REFILL_CHOICE_DEFS['kids_shampoo'];
    if (_kidsDef) {
      if (!state.quantities[_kidsDef.base.id]) state.quantities[_kidsDef.base.id] = 1;
      const _kidsOpt = _kidsDef.opts.find(function(o){ return o.key === 'with_body'; });
      if (_kidsOpt && _kidsOpt.extraId && !state.quantities[_kidsOpt.extraId]) {
        state.quantities[_kidsOpt.extraId] = 1;
      }
    }
  }
  if (state.refillChoices['kids_shampoo']) {
    if (!state.cartAdded) state.cartAdded = {};
    if (!state.cartAdded['refill_kids_shampoo']) {
      state.cartAdded['refill_kids_shampoo'] = true;
    }
    if (!state.confirmedSelections) state.confirmedSelections = {};
    if (state.confirmedSelections['refill_kids_shampoo'] === undefined) {
      state.confirmedSelections['refill_kids_shampoo'] = state.refillChoices['kids_shampoo'];
    }
    if (!state.confirmedRefillQty) state.confirmedRefillQty = {};
    if (state.confirmedRefillQty['kids_shampoo'] === undefined) {
      state.confirmedRefillQty['kids_shampoo'] = state.refillQty['kids_shampoo'] || 1;
    }
  }
}

function renderPropInfo() {
  const p = state.property;
  // 室数・units初期化保証
  if (!Array.isArray(p.units) || p.units.length === 0) p.units = [{number:'',maxGuests:0,bathrooms:0,toilets:0,isFamily:null}];
  if (!p.numUnits || p.numUnits < 1) p.numUnits = p.units.length;
  if (p.numUnits !== p.units.length) {
    while (p.units.length < p.numUnits) p.units.push({number:'',maxGuests:0,bathrooms:0,toilets:0,isFamily:null});
    p.units.length = p.numUnits;
  }
  // 既存unitに isFamily が無い場合は補完
  p.units.forEach(u => { if (u.isFamily === undefined) u.isFamily = null; });
  const valid = isPropInfoValid();

  const emailInvalid = p.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(p.email);

  // 室数選択コントロール
  const numUnitsOpts = [];
  for (let i = 1; i <= 20; i++) numUnitsOpts.push(`<option value="${i}"${p.numUnits===i?' selected':''}>${i}室</option>`);
  const unitsControl = `
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 16px;background:#f0f9ff;border:1.5px solid #bfdbfe;border-radius:14px;margin-bottom:18px">
      <div style="font-size:13px;font-weight:800;color:var(--brand);flex-shrink:0">契約室数 <span style="color:var(--danger)">*</span></div>
      <select onchange="setNumUnits(this.value)" style="padding:8px 14px;font-size:14px;font-weight:700;border-radius:10px;border:1.5px solid #bfdbfe;background:#fff;cursor:pointer;font-family:var(--mono);color:var(--brand)">
        ${numUnitsOpts.join('')}
      </select>
      <div style="font-size:12px;color:#475569;font-weight:500;flex:1;min-width:200px">
        全物件で<strong>同じ発注内容</strong>の場合のみ、室数を増やしてまとめて発注できます。物件ごとに内容が異なる場合は、物件ごとに別々のフォームをご送信ください。
      </div>
    </div>`;

  // 重複している物件番号のインデックス集合
  const _dupIdx = getDuplicateNumberIndices();

  // 各物件ブロック生成
  function unitBlock(idx) {
    const u = p.units[idx];
    const numberInvalid = u.number && !/^[0-9]{4}$/.test(u.number);
    const isDup = _dupIdx.has(idx);

// 物件情報の入力完了判定（バリデーション含む）
function isPropInfoValid() {
  const p = state.property;
  if (!Array.isArray(p.units) || p.units.length === 0) return false;
  // 各物件の入力チェック
  const numbers = [];
  for (const u of p.units) {
    if (!u.number || !/^[0-9]{4}$/.test(u.number)) return false;
    if (!(u.maxGuests > 0)) return false;
    if (!(u.bathrooms > 0)) return false;
    if (!(u.toilets > 0)) return false;
    if (u.isFamily !== true && u.isFamily !== false) return false;
    numbers.push(u.number);
  }
  // 物件番号の重複チェック
  if (new Set(numbers).size !== numbers.length) return false;
  // 契約者情報
  const emailOk = p.email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(p.email);
  const contactOk = p.contactSameAsOwner ? !!p.owner : (!!p.owner && !!p.contact);
  return !!(p.owner && emailOk && contactOk);
}

// 重複している物件番号のインデックスを取得（重複している場合のみ）
function getDuplicateNumberIndices() {
  const p = state.property;
  if (!p || !p.units) return new Set();
  const counts = {};
  p.units.forEach(u => {
    const n = (u.number||'').trim();
    if (n && /^[0-9]{4}$/.test(n)) counts[n] = (counts[n]||0) + 1;
  });
  const dupSet = new Set();
  p.units.forEach((u, i) => {
    const n = (u.number||'').trim();
    if (n && counts[n] > 1) dupSet.add(i);
  });
  return dupSet;
}

// ── 確認画面：数量変更・削除ボタン付き ──
function checkBeforeOrder() {
  const step2Done = state.completedSteps['recommend'];
  const step3Done = OPT_CATS.some(s => state.completedSteps[s.key]);
  if (!step2Done || !step3Done) {
    // カスタムポップアップ表示
    const overlay = document.createElement('div');
    overlay.className = 'reset-dialog-overlay';
    overlay.id = 'order-check-overlay';
    let btns = '';
    if (!step2Done) btns += `<button class="btn-cancel" style="border-color:#f59e0b;color:#92400e" onclick="document.getElementById('order-check-overlay').remove();openStep('recommend')">推奨品目を確認 →</button>`;
    if (!step3Done) btns += `<button class="btn-cancel" style="border-color:#f59e0b;color:#92400e" onclick="document.getElementById('order-check-overlay').remove();openStep('optList')">任意追加を確認 →</button>`;
    btns += `<button class="btn-confirm-reset" onclick="document.getElementById('order-check-overlay').remove();sendOrderEmail()">このまま発注する</button>`;
    overlay.innerHTML = `<div class="reset-dialog">
      <div style="font-size:20px;margin-bottom:8px">⚠️</div>
      <div class="reset-dialog-title" style="color:#92400e">未確認の項目があります</div>
      <div class="reset-dialog-msg">${(!step2Done?'推奨品目':'')}${(!step2Done&&!step3Done?'・':'')}${(!step3Done?'任意追加品目':'')}が未確認です。<br>発注前に確認することをお勧めします。</div>
      <div class="reset-dialog-btns" style="flex-direction:column;gap:8px">${btns}</div>
    </div>`;
    document.body.appendChild(overlay);
    return;
  }
  sendOrderEmail();
}
function confirmGradeChange(gid) {
  // プルダウンから値を取得
  const sel = document.getElementById('grade-sel-' + gid);
  const grade = sel ? sel.value : null;
  if (!grade) return;
  state.gradeSelections[gid] = grade;
  if (!(state.gradeQty[gid] > 0)) state.gradeQty[gid] = 1;
  showToast('グレードを「' + (GRADE_GROUPS.find(g=>g.id===gid)||{}).options?.find(o=>o.grade===grade)?.label + '」に変更しました');
  render(true);
}
function confirmQtyChange(type, key, delta) {
  if (!state.confirmedSelections) state.confirmedSelections = {};
  if (!state.confirmedGradeQty) state.confirmedGradeQty = {};
  if (!state.confirmedChoiceQty) state.confirmedChoiceQty = {};
  if (!state.confirmedRefillQty) state.confirmedRefillQty = {};
  if (!state.confirmedQty) state.confirmedQty = {};
  if (type === 'grade') {
    const g = GRADE_GROUPS.find(x=>x.id===key);
    const isMandatory = g && g.req === '必須';
    const cur = state.gradeQty[key] || 0;
    const next = cur + delta;
    if (isMandatory && next < 1) { showToast('必須項目は1セット以上必要です'); return; }
    if (next < 0) return;
    state.gradeQty[key] = next;
    state.confirmedGradeQty[key] = next; // 同期
  } else if (type === 'set') {
    const def = SET_DEFS[key];
    const isMandatory = def && def.req === '必須';
    const cur = state.setQty[key] || 0;
    const next = cur + delta;
    if (isMandatory && next < 1) { showToast('必須項目は1セット以上必要です'); return; }
    if (next < 0) return;
    state.setQty[key] = next;
  } else if (type === 'choice') {
    const def = CHOICE_DEFS[key];
    const isMandatory = def && def.req === true;
    const cur = state.choiceQty[key] || 0;
    const next = cur + delta;
    if (isMandatory && next < 1) { showToast('必須項目は1以上必要です'); return; }
    if (next < 0) return;
    state.choiceQty[key] = next;
    state.confirmedChoiceQty[key] = next; // 同期
  } else if (type === 'refill') {
    const def = REFILL_CHOICE_DEFS[key];
    const isMandatory = def && (def.req === '必須');
    const cur = state.refillQty[key] || 0;
    const next = cur + delta;
    if (isMandatory && next < 1) { showToast('必須項目は1以上必要です'); return; }
    if (next < 0) return;
    state.refillQty[key] = next;
    state.confirmedRefillQty[key] = next; // 同期
  } else if (type === 'item') {
    const item = ITEMS[key];
    const isMandatory = item && item.req === '必須';
    const cur = state.quantities[key] || 0;
    const next = cur + delta;
    if (isMandatory && next < 1) { showToast('必須項目は1以上必要です'); return; }
    if (next < 0) return;
    state.quantities[key] = next;
    state.confirmedQty[key] = next; // 同期
  } else if (type === 'virtual') {
    const cur = state.quantities[key] || 0;
    const next = cur + delta;
    if (next < 0) return;
    state.quantities[key] = next;
    state.confirmedQty[key] = next; // 同期
  }
  render(true);
}
function confirmDelete(type, key) {
  if (!state.confirmedSelections) state.confirmedSelections = {};
  if (type === 'grade') {
    state.gradeQty[key] = 0; state.gradeSelections[key] = null;
    delete state.confirmedSelections['grade_'+key];
    if (state.confirmedGradeQty) delete state.confirmedGradeQty[key];
    if (state.cartAdded) delete state.cartAdded['grade_'+key];
  } else if (type === 'set') {
    state.setQty[key] = 0;
    if (state.cartAdded) delete state.cartAdded['set_'+key];
  } else if (type === 'choice') {
    state.choiceQty[key] = 0; state.choiceSelections[key] = null;
    delete state.confirmedSelections['choice_'+key];
    if (state.confirmedChoiceQty) delete state.confirmedChoiceQty[key];
    if (state.cartAdded) delete state.cartAdded['choice_'+key];
  } else if (type === 'refill') {
    state.refillQty[key] = 0; state.refillChoices[key] = null;
    delete state.confirmedSelections['refill_'+key];
    if (state.confirmedRefillQty) delete state.confirmedRefillQty[key];
    if (state.cartAdded) delete state.cartAdded['refill_'+key];
  } else if (type === 'item') {
    state.quantities[key] = 0;
    if (state.confirmedQty) delete state.confirmedQty[key];
    if (state.cartAdded) delete state.cartAdded[key];
  } else if (type === 'virtual') {
    state.quantities[key] = 0;
    if (state.confirmedQty) delete state.confirmedQty[key];
  }
  render(true);
}
