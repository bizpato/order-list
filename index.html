<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>民泊管理バンク 備品発注フォーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #d7f0ff;
      --surface: #ffffff;
      --border: #b8ddf5;
      --text: #1a2a3a;
      --text-sub: #5a7a9a;
      --accent: #215387;
      --accent-light: #e8f4ff;
      --accent-dark: #163a60;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --amber: #d97706;
      --amber-light: #fffbeb;
      --red: #ea4d3c;
      --red-light: #fff0ee;
      --yellow: #fff050;
      --yellow-dark: #c8b800;
      --purple: #7c3aed;
      --purple-light: #f5f3ff;
      --mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app { display: flex; flex-direction: column; min-height: 100vh; max-width: 680px; margin: 0 auto; }

    /* ─── HEADER ─── */
    .header {
      background: var(--accent);
      border-bottom: 1px solid var(--accent-dark);
      padding: 14px 20px 0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .logo { font-weight: 900; font-size: 17px; letter-spacing: -0.5px; color: #fff; }
    .logo span { color: var(--yellow); }
    .step-label { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 500; font-family: var(--mono); }

    .progress-tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
    .progress-tabs::-webkit-scrollbar { display: none; }
    .tab-item {
      flex-shrink: 0; padding: 8px 14px; font-size: 11px; font-weight: 700;
      border-bottom: 2px solid transparent; color: rgba(255,255,255,0.6); cursor: pointer;
      white-space: nowrap; transition: all .2s;
    }
    .tab-item.active { color: var(--yellow); border-bottom-color: var(--yellow); }
    .tab-item.done { color: rgba(255,255,255,0.9); }
    .tab-item.done::before { content: '✓ '; }

    /* ─── MAIN ─── */
    .main { flex: 1; padding: 20px 16px 120px; }

    /* ─── SECTION HEADER ─── */
    .section-head { margin-bottom: 16px; }
    .section-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; color: var(--accent); }
    .section-sub { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

    /* ─── NOTICE BOX ─── */
    .notice {
      background: var(--amber-light); border: 1px solid #fde68a;
      border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; font-size: 12px; line-height: 1.7;
    }
    .notice strong { color: var(--amber); }
    .notice-blue {
      background: var(--accent-light); border: 1px solid #b8ddf5;
      border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; font-size: 12px; line-height: 1.7;
    }
    .notice-blue strong { color: var(--accent); }

    /* ─── PROPERTY FORM ─── */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; display: block; letter-spacing: .5px; }
    .form-input {
      width: 100%; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 16px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--accent); background: #fff; }

    /* ─── ITEM CARD ─── */
    .item-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 14px; display: flex; gap: 12px;
      align-items: flex-start; margin-bottom: 10px; transition: all .2s;
    }
    .item-card.selected { border-color: var(--accent); background: var(--accent-light); }
    .item-card.mandatory-auto { border-color: #c4b5fd; background: var(--purple-light); }

    .item-img {
      width: 64px; height: 64px; border-radius: 10px; object-fit: contain;
      background: #fff; border: 1px solid var(--border); flex-shrink: 0;
      padding: 4px;
    }

    .item-body { flex: 1; min-width: 0; }

    .badge-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .badge {
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
      letter-spacing: .3px; white-space: nowrap;
    }
    .badge-essential { background: var(--red-light); color: var(--red); }
    .badge-recommended { background: var(--amber-light); color: var(--amber); }
    .badge-family { background: var(--green-light); color: var(--green); }
    .badge-host { background: #fff8e1; color: #b45309; }
    .badge-auto { background: var(--purple-light); color: var(--purple); }
    .badge-id { background: var(--bg); color: var(--text-sub); font-family: var(--mono); }
    .badge-millennium { background: #1a2a3a; color: #fff; }
    .badge-premium { background: #215387; color: #fff; }
    .badge-standard { background: var(--accent-light); color: var(--accent); }

    .item-name { font-size: 13px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
    .item-meta { font-size: 11px; color: var(--text-sub); }
    .item-price { font-size: 15px; font-weight: 900; font-family: var(--mono); color: var(--text); margin-top: 4px; }
    .item-price span { font-size: 10px; font-weight: 400; color: var(--text-sub); margin-left: 4px; }

    .host-note {
      font-size: 10px; padding: 5px 8px; border-radius: 6px; margin-top: 6px; font-weight: 500;
    }
    .host-note.cx9 { background: var(--accent-light); color: var(--accent); }
    .host-note.host { background: var(--amber-light); color: var(--amber); }
    .host-note.auto-locked { background: var(--purple-light); color: var(--purple); }

    /* ─── QTY CONTROL ─── */
    .qty-control { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
    .qty-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--surface); font-size: 16px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all .15s; font-weight: 700; color: var(--accent);
    }
    .qty-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
    .qty-btn:disabled { color: var(--border); cursor: default; }
    .qty-num { font-family: var(--mono); font-size: 14px; font-weight: 700; min-width: 28px; text-align: center; padding: 4px 0; }
    .qty-unit { font-size: 9px; color: var(--text-sub); }

    /* ─── REFILL TOGGLE (本体/詰め替えのみ) ─── */
    .refill-toggle {
      display: flex; background: var(--bg); border-radius: 8px; padding: 3px; gap: 2px; margin-top: 8px;
    }
    .refill-btn {
      flex: 1; padding: 5px 8px; font-size: 10px; font-weight: 700; border-radius: 6px;
      border: none; cursor: pointer; transition: all .2s; background: transparent; color: var(--text-sub);
    }
    .refill-btn.active-set { background: var(--accent); color: #fff; }
    .refill-btn.active-refill { background: var(--amber); color: #fff; }

    /* ─── GRADE SELECTOR ─── */
    .grade-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 10px;
    }
    .grade-card.selected { border-color: var(--accent); background: var(--accent-light); }
    .grade-label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 10px; }
    .grade-name { font-size: 15px; font-weight: 900; margin-bottom: 10px; color: var(--accent); }
    .grade-options { display: flex; background: var(--bg); border-radius: 10px; padding: 3px; gap: 3px; margin-bottom: 12px; }
    .grade-opt-btn {
      flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 700; border-radius: 8px;
      border: none; cursor: pointer; transition: all .2s; background: transparent; color: var(--text-sub);
    }
    .grade-opt-btn.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    .grade-detail { display: flex; gap: 12px; align-items: flex-start; }
    .grade-img { width: 56px; height: 56px; border-radius: 8px; object-fit: contain; background: #fff; border: 1px solid var(--border); flex-shrink: 0; padding: 3px; }
    .grade-info { flex: 1; }
    .grade-price { font-size: 16px; font-weight: 900; font-family: var(--mono); color: var(--accent); }
    .grade-price-sub { font-size: 10px; color: var(--text-sub); margin-top: 2px; }

    /* ─── HOST PREP ALERT ─── */
    .host-prep-alert {
      background: #fff8e1; border: 1px solid #fcd34d; border-radius: 8px;
      padding: 8px 12px; margin-top: 8px; font-size: 10px; color: #92400e; font-weight: 600;
      line-height: 1.5;
    }

    /* ─── SUBSECTION ─── */
    .subsection { margin-bottom: 24px; }
    .subsection-title {
      font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 1px;
      text-transform: uppercase; padding: 6px 0; margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ─── SUMMARY ─── */
    .summary-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 12px;
    }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--bg); }
    .summary-row:last-child { border-bottom: none; }
    .summary-name { font-size: 13px; flex: 1; }
    .summary-qty { font-family: var(--mono); font-size: 11px; color: var(--text-sub); margin: 0 12px; }
    .summary-price { font-family: var(--mono); font-size: 13px; font-weight: 700; }
    .summary-total {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 16px; background: var(--accent); border-radius: 14px; color: #fff; margin-top: 16px;
    }
    .total-label { font-size: 11px; font-weight: 500; opacity: .7; letter-spacing: 1px; }
    .total-amount { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--yellow); }

    /* ─── SUBMIT AREA ─── */
    .submit-info { font-size: 12px; color: var(--text-sub); text-align: center; margin-bottom: 12px; }
    .webhook-input-wrap { margin-bottom: 16px; }

    /* ─── FOOTER NAV ─── */
    .footer-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      background: rgba(255,255,255,.97); backdrop-filter: blur(12px);
      border-top: 1px solid var(--border); padding: 12px 16px;
      display: flex; align-items: center; gap: 10px; z-index: 200;
    }
    .nav-total { flex: 1; }
    .nav-total-label { font-size: 9px; color: var(--text-sub); font-weight: 700; letter-spacing: .5px; }
    .nav-total-amount { font-family: var(--mono); font-size: 18px; font-weight: 900; color: var(--accent); }
    .nav-back {
      padding: 10px 18px; border-radius: 10px; border: 1.5px solid var(--border);
      background: transparent; font-weight: 700; font-size: 13px; cursor: pointer; color: var(--text-sub);
    }
    .nav-next {
      padding: 10px 28px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-weight: 900; font-size: 14px; cursor: pointer;
      transition: background .2s; white-space: nowrap;
    }
    .nav-next:hover { background: var(--accent-dark); }
    .nav-next:disabled { background: var(--border); cursor: default; }

    /* ─── SUBMIT BUTTON ─── */
    .submit-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none;
      background: var(--green); color: #fff; font-size: 16px; font-weight: 900;
      cursor: pointer; transition: all .2s; margin-top: 16px;
    }
    .submit-btn:hover:not(:disabled) { background: #15803d; }
    .submit-btn:disabled { background: var(--border); cursor: default; }

    /* ─── SUCCESS ─── */
    .success-box { text-align: center; padding: 40px 20px; }
    .success-icon { font-size: 56px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; color: var(--accent); }
    .success-sub { font-size: 14px; color: var(--text-sub); line-height: 1.7; }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 480px) {
      .item-card { padding: 12px; gap: 10px; }
      .item-img { width: 54px; height: 54px; }
    }
  </style>
</head>

</div>

// ================================================================
// STATE
// ================================================================
let currentStep = 0;
let state = {
  property: { name:'', rooms:1, webhook:'' },
  // グレード選択状態 { groupId: { grade, refillMode } }
  gradeSelections: {},
  // 数量 { itemId: qty }
  quantities: {},
};

// グレードグループの初期化（デフォルトグレード設定）
GRADE_GROUPS.forEach(g => {
  state.gradeSelections[g.id] = { grade: g.defaultGrade, refillMode: 'set' };
});

// ================================================================
// HELPERS
// ================================================================
function fmt(n) { return '¥' + n.toLocaleString(); }

function getGradeOption(groupId) {
  const sel = state.gradeSelections[groupId];
  const group = GRADE_GROUPS.find(g => g.id === groupId);
  return group.options.find(o => o.grade === sel.grade);
}

function getGradePrice(groupId) {
  const sel = state.gradeSelections[groupId];
  const opt = getGradeOption(groupId);
  if (!opt) return 0;
  const items = (sel.refillMode === 'refill' && opt.refillItems) ? opt.refillItems : opt.setItems;
  return items.reduce((s, i) => s + i.price * i.qty, 0);
}

function calcTotal() {
  let total = 0;
  // 初回必須セット
  ESSENTIAL_ITEMS.forEach(item => {
    if (item.isRefillable) {
      const mode = state.quantities['__refill_' + item.id] || 'set';
      const price = mode === 'refill' ? item.refillOnlyPrice : item.setPrice;
      const qty = state.quantities[item.id] || item.min;
      total += price * qty;
    } else {
      const qty = state.quantities[item.id] || item.min;
      total += item.price * qty;
    }
  });
  // グレードグループ
  GRADE_GROUPS.forEach(g => {
    total += getGradePrice(g.id);
  });
  // 個別品目
  Object.entries(state.quantities).forEach(([id, qty]) => {
    if (id.startsWith('__')) return;
    if (ITEMS[id]) total += ITEMS[id].price * qty;
  });
  return total;
}

function updateTotalDisplay() {
  document.getElementById('nav-total').textContent = fmt(calcTotal());
}

// ================================================================
// RENDER
// ================================================================
function render() {
  const tabs = document.getElementById('progress-tabs');
  tabs.innerHTML = STEPS.map((s, i) => {
    let cls = 'tab-item';
    if (i === currentStep) cls += ' active';
    else if (i < currentStep) cls += ' done';
    return `<div class="${cls}" onclick="goStep(${i})">${s}</div>`;
  }).join('');
  document.getElementById('step-label').textContent = `STEP ${currentStep+1} / ${STEPS.length}`;

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  switch(currentStep) {
    case 0: renderPropertyStep(main); break;
    case 1: renderEssentialStep(main); break;
    case 2: renderBathAmenityStep(main); break;
    case 3: renderToiletStep(main); break;
    case 4: renderKitchenStep(main); break;
    case 5: renderLaundryStep(main); break;
    case 6: renderFoodStep(main); break;
    case 7: renderFragranceStep(main); break;
    case 8: renderOtherStep(main); break;
    case 9: renderSummaryStep(main); break;
  }

  document.getElementById('btn-back').disabled = currentStep === 0;
  document.getElementById('btn-next').textContent = currentStep === STEPS.length-1 ? '送信' : '次へ →';
  updateTotalDisplay();
  main.scrollTop = 0;
  window.scrollTo(0,0);
}

function renderSummaryStep(el) {
  let rows = '';
  let total = 0;

  // 初回必須セット
  ESSENTIAL_ITEMS.forEach(item => {
    const qty = state.quantities[item.id] || item.min;
    const refillMode = state.quantities['__refill_' + item.id] || 'set';
    const price = item.isRefillable
      ? (refillMode === 'refill' ? item.refillOnlyPrice : item.setPrice)
      : item.price;
    const subtotal = price * qty;
    total += subtotal;
    const modeLabel = item.isRefillable ? (refillMode==='refill' ? '詰め替えのみ' : '本体セット') : '';
    rows += `<div class="summary-row">
      <div class="summary-name">${item.name}${modeLabel ? ` <span style="font-size:10px;color:var(--amber)">[${modeLabel}]</span>` : ''}</div>
      <div class="summary-qty">×${qty}${item.unit}</div>
      <div class="summary-price">${fmt(subtotal)}</div>
    </div>`;
  });

  // グレードグループ
  GRADE_GROUPS.forEach(g => {
    const sel = state.gradeSelections[g.id];
    const opt = getGradeOption(g.id);
    if (!opt) return;
    const items = (sel.refillMode === 'refill' && opt.refillItems) ? opt.refillItems : opt.setItems;
    const price = items.reduce((s, i) => s + i.price * i.qty, 0);
    total += price;
    const modeLabel = (sel.refillMode === 'refill') ? '詰め替えのみ' : '本体セット';
    rows += `<div class="summary-row">
      <div class="summary-name">${g.name}（${opt.label}）<span style="font-size:10px;color:var(--amber)"> [${modeLabel}]</span></div>
      <div class="summary-qty">1セット</div>
      <div class="summary-price">${fmt(price)}</div>
    </div>`;
  });

  // 個別品目
  Object.entries(state.quantities).forEach(([id, qty]) => {
    if (id.startsWith('__') || !ITEMS[id] || qty === 0) return;
    const item = ITEMS[id];
    const subtotal = item.price * qty;
    total += subtotal;
    rows += `<div class="summary-row">
      <div class="summary-name">${item.name}</div>
      <div class="summary-qty">×${qty}${item.unit}</div>
      <div class="summary-price">${fmt(subtotal)}</div>
    </div>`;
  });

  // ホスト様準備リスト
  let hostPrepList = [];
  ESSENTIAL_ITEMS.forEach(item => {
    const refillMode = state.quantities['__refill_' + item.id] || 'set';
    if (item.isRefillable && refillMode === 'refill' && item.refillHostNote) {
      hostPrepList.push(item.refillHostNote);
    }
  });
  GRADE_GROUPS.forEach(g => {
    const sel = state.gradeSelections[g.id];
    const opt = getGradeOption(g.id);
    if (!opt) return;
    if (sel.refillMode === 'refill' && opt.refillHostNote) {
      hostPrepList.push(`【${g.name}】${opt.refillHostNote}`);
    } else if (opt.hostPrepNote) {
      hostPrepList.push(`【${g.name}】${opt.hostPrepNote}`);
    }
  });

  let hostPrepHtml = '';
  if (hostPrepList.length > 0) {
    hostPrepHtml = `
      <div class="notice" style="margin-top:16px;">
        <strong>⚠️ ホスト様準備が必要な品目</strong><br>
        ${hostPrepList.map(n => `・${n}`).join('<br>')}
      </div>`;
  }

  el.innerHTML = `
    <div class="section-head">
      <div class="section-title">確認・送信</div>
      <div class="section-sub">発注内容を確認してください</div>
    </div>
    <div class="summary-card">${rows}</div>
    <div class="summary-total">
      <div class="total-label">合計金額（目安）</div>
      <div class="total-amount">${fmt(total)}</div>
    </div>
    ${hostPrepHtml}
    <div class="form-group" style="margin-top:20px;">
      <label class="form-label">Webhook URL（任意）</label>
      <input class="form-input" id="inp-webhook" placeholder="https://..." value="${state.property.webhook}" oninput="state.property.webhook=this.value" />
    </div>
    <div class="submit-info">内容を確認の上、送信ボタンを押してください</div>
    <button class="submit-btn" onclick="submitOrder()">発注データを送信</button>
  `;
}

// ================================================================
// GRADE GROUP CARD
// ================================================================
function renderGradeGroupCard(groupId) {
  const group = GRADE_GROUPS.find(g => g.id === groupId);
  if (!group) return '';
  const sel = state.gradeSelections[groupId];
  const opt = getGradeOption(groupId);
  const price = getGradePrice(groupId);

  const optBtns = group.options.map(o =>
    `<button class="grade-opt-btn ${sel.grade===o.grade?'active':''}" onclick="setGrade('${groupId}','${o.grade}')">${o.label}</button>`
  ).join('');

  let refillToggle = '';
  if (opt && opt.hasRefillOption) {
    refillToggle = `
      <div class="refill-toggle" style="margin-top:10px;">
        <button class="refill-btn ${sel.refillMode==='set'?'active-set':''}" onclick="setGradeRefill('${groupId}','set')">本体セット</button>
        <button class="refill-btn ${sel.refillMode==='refill'?'active-refill':''}" onclick="setGradeRefill('${groupId}','refill')">詰め替えのみ</button>
      </div>`;
  }

  let hostNoteHtml = '';
  if (opt) {
    if (sel.refillMode === 'refill' && opt.refillHostNote) {
      hostNoteHtml = `<div class="host-prep-alert">⚠️ ホスト様準備：${opt.refillHostNote}</div>`;
    } else if (opt.hostPrepNote) {
      hostNoteHtml = `<div class="host-prep-alert">⚠️ ホスト様準備：${opt.hostPrepNote}</div>`;
    }
  }

  const gradeLabels = { standard:'スタンダード', premium:'プレミアム', millennium:'ミレニアム' };
  const badgeClass = sel.grade === 'millennium' ? 'badge-millennium' : sel.grade === 'premium' ? 'badge-premium' : 'badge-standard';

  return `
    <div class="grade-card selected" id="grade-${groupId}">
      <div class="badge-row">
        <span class="badge badge-auto">自動投入</span>
        <span class="badge badge-essential">必須</span>
        <span class="badge ${badgeClass}">${gradeLabels[sel.grade]||sel.grade}</span>
      </div>
      <div class="grade-name">${group.name}</div>
      <div class="grade-options">${optBtns}</div>
      <div class="grade-detail">
        <img class="grade-img" src="${opt?opt.img:''}" onerror="this.style.display='none'" />
        <div class="grade-info">
          <div style="font-size:12px;color:var(--text-sub);margin-bottom:4px;">${opt?opt.brand:''}</div>
          <div style="font-size:12px;margin-bottom:6px;">${opt?opt.description:''}</div>
          <div class="grade-price">${fmt(price)}</div>
          <div class="grade-price-sub">1セット分</div>
        </div>
      </div>
      ${refillToggle}
      ${hostNoteHtml}
    </div>`;
}

// ================================================================
// ITEM CARD
// ================================================================
function renderItemCard(id) {
  const item = ITEMS[id];
  if (!item) return '';
  const qty = state.quantities[id] || 0;
  const isSelected = qty > 0;

  let reqBadge = '';
  if (item.req === '必須') reqBadge = `<span class="badge badge-essential">必須</span>`;
  else if (item.req === '推奨') reqBadge = `<span class="badge badge-recommended">推奨</span>`;
  else if (item.req === 'ファミリー必須') reqBadge = `<span class="badge badge-family">ファミリー必須</span>`;

  return `
    <div class="item-card ${isSelected?'selected':''}" id="card-${id}" onclick="toggleItem('${id}')">
      <img class="item-img" src="${item.img||''}" onerror="this.style.display='none'" />
      <div class="item-body">
        <div class="badge-row">
          ${reqBadge}
          <span class="badge badge-id">${item.id}</span>
        </div>
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${item.brand||''}</div>
        <div class="item-price">${fmt(item.price)}<span>/ ${item.unit}（最小${item.min}${item.unit}）</span></div>
      </div>
      <div class="qty-control" onclick="event.stopPropagation()">
        <button class="qty-btn" onclick="changeQty('${id}',1)">＋</button>
        <div class="qty-num">${qty}</div>
        <button class="qty-btn" onclick="changeQty('${id}',-1)" ${qty<=0?'disabled':''}>－</button>
        <div class="qty-unit">${item.unit}</div>
      </div>
    </div>`;
}

// ================================================================
// ACTIONS
// ================================================================
function toggleItem(id) {
  const item = ITEMS[id];
  if (!item) return;
  if ((state.quantities[id] || 0) === 0) {
    state.quantities[id] = item.min;
  } else {
    state.quantities[id] = 0;
  }
  render();
}

function changeQty(id, delta) {
  // 初回必須セット品目
  const essItem = ESSENTIAL_ITEMS.find(i => i.id === id);
  if (essItem) {
    const cur = state.quantities[id] || essItem.min;
    const next = cur + delta;
    if (next >= essItem.min) {
      state.quantities[id] = next;
      // カードの数量表示だけ更新（再レンダリングせず）
      const numEl = document.querySelector(`#card-${id} .qty-num`);
      const minusBtn = document.querySelector(`#card-${id} .qty-btn:last-of-type`);
      const priceEl = document.querySelector(`#card-${id} .item-price`);
      if (numEl) numEl.textContent = next;
      if (minusBtn) minusBtn.disabled = next <= essItem.min;
      if (priceEl) {
        const refillMode = state.quantities['__refill_' + id] || 'set';
        const price = essItem.isRefillable
          ? (refillMode === 'refill' ? essItem.refillOnlyPrice : essItem.setPrice)
          : essItem.price;
        priceEl.innerHTML = `${fmt(price * next)}<span>×${next}${essItem.unit}</span>`;
      }
    }
    updateTotalDisplay();
    return;
  }
  // 通常品目
  const item = ITEMS[id];
  if (!item) return;
  const cur = state.quantities[id] || 0;
  const next = Math.max(0, cur + delta * item.min);
  state.quantities[id] = next;
  const numEl = document.querySelector(`#card-${id} .qty-num`);
  const minusBtn = document.querySelector(`#card-${id} .qty-btn:last-of-type`);
  const card = document.getElementById('card-' + id);
  if (numEl) numEl.textContent = next;
  if (minusBtn) minusBtn.disabled = next <= 0;
  if (card) {
    if (next > 0) card.classList.add('selected');
    else card.classList.remove('selected');
  }
  updateTotalDisplay();
}

function setRefillMode(itemId, mode) {
  state.quantities['__refill_' + itemId] = mode;
  // 該当カードだけ再描画
  const essItem = ESSENTIAL_ITEMS.find(i => i.id === itemId);
  if (essItem) {
    const card = document.getElementById('card-' + itemId);
    if (card) card.outerHTML = renderEssentialCard(essItem);
  }
  updateTotalDisplay();
}

function setGrade(groupId, grade) {
  state.gradeSelections[groupId].grade = grade;
  // プレミアムは詰め替えオプションなし→setに戻す
  const opt = GRADE_GROUPS.find(g=>g.id===groupId).options.find(o=>o.grade===grade);
  if (!opt || !opt.hasRefillOption) {
    state.gradeSelections[groupId].refillMode = 'set';
  }
  const card = document.getElementById('grade-' + groupId);
  if (card) card.outerHTML = renderGradeGroupCard(groupId);
  updateTotalDisplay();
}

function setGradeRefill(groupId, mode) {
  state.gradeSelections[groupId].refillMode = mode;
  const card = document.getElementById('grade-' + groupId);
  if (card) card.outerHTML = renderGradeGroupCard(groupId);
  updateTotalDisplay();
}

function goStep(i) {
  currentStep = i;
  render();
}

function nextStep() {
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    render();
  } else {
    submitOrder();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    render();
  }
}

async function submitOrder() {
  const payload = {
    property: state.property,
    gradeSelections: state.gradeSelections,
    quantities: state.quantities,
    total: calcTotal(),
    timestamp: new Date().toISOString(),
  };

  const btn = document.querySelector('.submit-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>送信中...';
  }

  if (state.property.webhook) {
    try {
      await fetch(state.property.webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch(e) { console.error(e); }
  }

  document.getElementById('main-content').innerHTML = `
    <div class="success-box">
      <div class="success-icon">✅</div>
      <div class="success-title">発注データを送信しました</div>
      <div class="success-sub">
        物件：${state.property.name || '未入力'}<br>
        合計金額（目安）：${fmt(calcTotal())}<br><br>
        担当者にて内容を確認の上、発注処理を行います。
      </div>
    </div>`;
  document.querySelector('.footer-nav').style.display = 'none';
}

// ================================================================
// INIT
// ================================================================
render();
</script>
</body>
</html>
