<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>民泊管理バンク 備品発注フォーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --border: #e4e8ef;
      --text: #1a1f2e;
      --text-sub: #6b7280;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --accent-dark: #1d4ed8;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --amber: #d97706;
      --amber-light: #fffbeb;
      --red: #dc2626;
      --red-light: #fef2f2;
      --purple: #7c3aed;
      --purple-light: #f5f3ff;
      --mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── LAYOUT ─── */
    .app { display: flex; flex-direction: column; min-height: 100vh; max-width: 680px; margin: 0 auto; }

    /* ─── HEADER ─── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .logo { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .step-label { font-size: 11px; color: var(--text-sub); font-weight: 500; font-family: var(--mono); }

    /* progress tabs */
    .progress-tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
    .progress-tabs::-webkit-scrollbar { display: none; }
    .tab-item {
      flex-shrink: 0; padding: 8px 14px; font-size: 11px; font-weight: 700;
      border-bottom: 2px solid transparent; color: var(--text-sub); cursor: pointer;
      white-space: nowrap; transition: all .2s;
    }
    .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-item.done { color: var(--green); }
    .tab-item.done::before { content: '✓ '; }

    /* ─── MAIN ─── */
    .main { flex: 1; padding: 20px 16px 120px; }

    /* ─── SECTION HEADER ─── */
    .section-head { margin-bottom: 16px; }
    .section-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
    .section-sub { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

    /* ─── NOTICE BOX ─── */
    .notice {
      background: var(--amber-light); border: 1px solid #fde68a;
      border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; font-size: 12px; line-height: 1.7;
    }
    .notice strong { color: var(--amber); }

    /* ─── PROPERTY FORM ─── */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; display: block; letter-spacing: .5px; }
    .form-input {
      width: 100%; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 16px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--accent); background: #fff; }

    /* ─── ITEM CARD ─── */
    .item-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 14px; display: flex; gap: 12px;
      align-items: flex-start; margin-bottom: 10px; transition: all .2s;
    }
    .item-card.selected { border-color: var(--accent); background: var(--accent-light); }
    .item-card.mandatory-auto { border-color: #c4b5fd; background: var(--purple-light); }

    .item-img {
      width: 64px; height: 64px; border-radius: 10px; object-fit: contain;
      background: #fff; border: 1px solid var(--border); flex-shrink: 0;
      padding: 4px;
    }

    .item-body { flex: 1; min-width: 0; }

    .badge-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .badge {
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
      letter-spacing: .3px; white-space: nowrap;
    }
    .badge-essential { background: var(--red-light); color: var(--red); }
    .badge-recommended { background: var(--amber-light); color: var(--amber); }
    .badge-family { background: var(--green-light); color: var(--green); }
    .badge-host { background: #f0f9ff; color: #0369a1; }
    .badge-auto { background: var(--purple-light); color: var(--purple); }
    .badge-id { background: var(--bg); color: var(--text-sub); font-family: var(--mono); }

    .item-name { font-size: 13px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
    .item-meta { font-size: 11px; color: var(--text-sub); }
    .item-price { font-size: 15px; font-weight: 900; font-family: var(--mono); color: var(--text); margin-top: 4px; }
    .item-price span { font-size: 10px; font-weight: 400; color: var(--text-sub); margin-left: 4px; }

    .host-note {
      font-size: 10px; padding: 5px 8px; border-radius: 6px; margin-top: 6px; font-weight: 500;
    }
    .host-note.cx9 { background: var(--accent-light); color: var(--accent); }
    .host-note.host { background: var(--amber-light); color: var(--amber); }
    .host-note.auto-locked { background: var(--purple-light); color: var(--purple); }

    /* ─── QTY CONTROL ─── */
    .qty-control { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
    .qty-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--surface); font-size: 16px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all .15s; font-weight: 700; color: var(--accent);
    }
    .qty-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
    .qty-btn:disabled { color: var(--border); cursor: default; }
    .qty-num { font-family: var(--mono); font-size: 14px; font-weight: 700; min-width: 28px; text-align: center; padding: 4px 0; }
    .qty-unit { font-size: 9px; color: var(--text-sub); }

    /* ─── HOST TOGGLE ─── */
    .host-toggle { display: flex; background: var(--bg); border-radius: 8px; padding: 3px; gap: 2px; margin-top: 8px; }
    .host-btn {
      flex: 1; padding: 5px 8px; font-size: 10px; font-weight: 700; border-radius: 6px;
      border: none; cursor: pointer; transition: all .2s; background: transparent; color: var(--text-sub);
    }
    .host-btn.active-cx9 { background: var(--accent); color: #fff; }
    .host-btn.active-host { background: var(--amber); color: #fff; }

    /* ─── GRADE SELECTOR (アメニティグループ) ─── */
    .grade-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 10px;
    }
    .grade-card.selected { border-color: var(--accent); background: var(--accent-light); }
    .grade-label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 10px; }
    .grade-name { font-size: 15px; font-weight: 900; margin-bottom: 10px; }
    .grade-options { display: flex; background: var(--bg); border-radius: 10px; padding: 3px; gap: 3px; margin-bottom: 12px; }
    .grade-options.vertical { flex-direction: column; gap: 4px; }
    .grade-opt-btn {
      flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 700; border-radius: 8px;
      border: none; cursor: pointer; transition: all .2s; background: transparent; color: var(--text-sub);
    }
    .grade-opt-btn.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    .grade-detail { display: flex; gap: 12px; align-items: flex-start; }
    .grade-img { width: 56px; height: 56px; border-radius: 8px; object-fit: contain; background: #fff; border: 1px solid var(--border); flex-shrink: 0; padding: 3px; }
    .grade-info { flex: 1; }
    .grade-price { font-size: 16px; font-weight: 900; font-family: var(--mono); }
    .grade-price-sub { font-size: 10px; color: var(--text-sub); margin-top: 2px; }

    /* ─── SUBSECTION ─── */
    .subsection { margin-bottom: 24px; }
    .subsection-title {
      font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 1px;
      text-transform: uppercase; padding: 6px 0; margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ─── SUMMARY ─── */
    .summary-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 12px;
    }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--bg); }
    .summary-row:last-child { border-bottom: none; }
    .summary-name { font-size: 13px; flex: 1; }
    .summary-qty { font-family: var(--mono); font-size: 11px; color: var(--text-sub); margin: 0 12px; }
    .summary-price { font-family: var(--mono); font-size: 13px; font-weight: 700; }
    .summary-total {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 16px; background: var(--text); border-radius: 14px; color: #fff; margin-top: 16px;
    }
    .total-label { font-size: 11px; font-weight: 500; opacity: .7; letter-spacing: 1px; }
    .total-amount { font-family: var(--mono); font-size: 28px; font-weight: 700; color: #60a5fa; }

    /* ─── SUBMIT AREA ─── */
    .submit-info { font-size: 12px; color: var(--text-sub); text-align: center; margin-bottom: 12px; }
    .webhook-input-wrap { margin-bottom: 16px; }

    /* ─── FOOTER NAV ─── */
    .footer-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      background: rgba(255,255,255,.95); backdrop-filter: blur(12px);
      border-top: 1px solid var(--border); padding: 12px 16px;
      display: flex; align-items: center; gap: 10px; z-index: 200;
    }
    .nav-total { flex: 1; }
    .nav-total-label { font-size: 9px; color: var(--text-sub); font-weight: 700; letter-spacing: .5px; }
    .nav-total-amount { font-family: var(--mono); font-size: 18px; font-weight: 900; color: var(--accent); }
    .nav-back {
      padding: 10px 18px; border-radius: 10px; border: 1.5px solid var(--border);
      background: transparent; font-weight: 700; font-size: 13px; cursor: pointer; color: var(--text-sub);
    }
    .nav-next {
      padding: 10px 28px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-weight: 900; font-size: 14px; cursor: pointer;
      transition: background .2s; white-space: nowrap;
    }
    .nav-next:hover { background: var(--accent-dark); }
    .nav-next:disabled { background: var(--border); cursor: default; }

    /* ─── SUBMIT BUTTON ─── */
    .submit-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none;
      background: var(--green); color: #fff; font-size: 16px; font-weight: 900;
      cursor: pointer; transition: all .2s; margin-top: 16px;
    }
    .submit-btn:hover:not(:disabled) { background: #15803d; }
    .submit-btn:disabled { background: var(--border); cursor: default; }

    /* ─── SUCCESS ─── */
    .success-box {
      text-align: center; padding: 40px 20px;
    }
    .success-icon { font-size: 56px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--text-sub); line-height: 1.7; }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 480px) {
      .item-card { padding: 12px; gap: 10px; }
      .item-img { width: 54px; height: 54px; }
    }
  </style>
</head>

let state = {
  currentStep: 0,
  property: { name: '', number: '', contact: '' },
  quantities: {},      // id -> qty (数量)
  hostChoice: {},      // id -> 'cx9' | 'host'
  gradeSelections: {
    bath_amenity: 'standard',
    toiletsheet: '',
    toiletdeodor: '',
    handsoap: 'standard',
    toothbrush: 'standard',
    dishsoap: 'standard',
  },
  gradeQty: {},        // gradeGroupId -> qty
  webhookUrl: '', // ← 管理者はここにWebhook URLを直接設定可能
};

// 初回必須セット自動投入
function initMandatory() {
  MANDATORY_IDS.forEach(id => {
    if (!state.quantities[id]) {
      const item = ITEMS[id] || SET_ITEMS[id];
      if (item) state.quantities[id] = item.min;
    }
  });
  // バスアメニティグループも初期値1
  GRADE_GROUPS.forEach(g => {
    if (!state.gradeQty[g.id]) state.gradeQty[g.id] = 1;
  });
}
initMandatory();

// ================================================================
// UTILS
// ================================================================
function getItemPrice(id) {
  if (ITEMS[id]) return ITEMS[id].price;
  if (SET_ITEMS[id]) return SET_ITEMS[id].price;
  return 0;
}
function getItemMin(id) {
  if (ITEMS[id]) return ITEMS[id].min;
  if (SET_ITEMS[id]) return SET_ITEMS[id].min;
  return 1;
}

function calcTotal() {
  let total = 0;
  // 通常品
  for (const [id, qty] of Object.entries(state.quantities)) {
    total += getItemPrice(id) * qty;
  }
  // グレードグループ
  GRADE_GROUPS.forEach(g => {
    const qty = state.gradeQty[g.id] || 0;
    const opt = g.options.find(o => o.grade === state.gradeSelections[g.id]);
    if (opt && qty > 0) total += opt.totalPrice * qty;
  });
  // 歯ブラシ
  const tbGrade = state.gradeSelections.toothbrush;
  const tbOpt = TOOTHBRUSH_OPTIONS.find(o => o.grade === tbGrade);
  if (tbOpt && state.quantities['_toothbrush']) {
    total += tbOpt.price * state.quantities['_toothbrush'];
  }
  // 食器洗剤
  const dsGrade = state.gradeSelections.dishsoap;
  const dsOpt = DISH_SOAP_OPTIONS.find(o => o.grade === dsGrade);
  if (dsOpt && state.quantities['_dishsoap']) {
    total += dsOpt.totalPrice * state.quantities['_dishsoap'];
  }
  // 無印芳香剤セット
  ['MUJI_citrus','MUJI_woody'].forEach(id => {
    const qty = state.quantities[id] || 0;
    if (qty > 0 && SET_ITEMS[id]) total += SET_ITEMS[id].price * qty;
  });
  return total;
}

function fmt(n) { return '¥' + Math.round(n).toLocaleString('ja-JP'); }

function badgeHTML(req, hostPrep, isAuto) {
  let html = '';
  if (isAuto) html += `<span class="badge badge-auto">自動補充</span>`;
  if (req === '必須') html += `<span class="badge badge-essential">必須</span>`;
  else if (req === 'スタンダード必須') html += `<span class="badge badge-essential">必須</span>`;
  else if (req === '推奨') html += `<span class="badge badge-recommended">推奨</span>`;
  else if (req === 'ファミリー必須') html += `<span class="badge badge-family">ファミリー必須</span>`;
  if (hostPrep) html += `<span class="badge badge-host">ホスト様準備可</span>`;
  return html;
}

function hostToggleHTML(id, hostPrep) {
  if (!hostPrep) return '';
  const choice = state.hostChoice[id] || 'cx9';

// ホスト様準備不可の必須品目ID一覧（hostPrep:true でないもので req:'必須'）
function getMandatoryNonHostItems() {
  const results = [];
  // 通常品（ファミリー必須は除外）
  for (const [id, item] of Object.entries(ITEMS)) {
    if ((item.req === '必須' || item.req === 'スタンダード必須') && !item.hostPrep) {
      results.push({ id, name: item.name });
    }
  }
  // セット品（ファミリー必須は除外）
  for (const [id, item] of Object.entries(SET_ITEMS)) {
    if ((item.req === '必須' || item.req === 'スタンダード必須') && !item.hostPrep) {
      results.push({ id, name: item.name });
    }
  }
  return results;
}

function validateMandatory() {
  const missing = [];
  const mandatoryItems = getMandatoryNonHostItems();

  for (const { id, name } of mandatoryItems) {
    const qty = state.quantities[id] || 0;
    if (qty <= 0) missing.push(name);
  }

  // トイレ掃除シートはどちらか選択必須
  const toiletSheetSel = state.gradeSelections['toiletsheet'];
  if (!toiletSheetSel) missing.push('トイレ掃除シート（どちらか選択）');

  // トイレットペーパーはどちらか選択必須
  const tpSel = state.gradeSelections['toiletpaper'];
  if (!tpSel) missing.push('トイレットペーパー（どちらか選択）');

  // トイレ消臭スプレーはどちらか選択必須
  const toiletDeodoSel = state.gradeSelections['toiletdeodor'];
  if (!toiletDeodoSel) missing.push('トイレ消臭スプレー（どちらか選択）');

  // サニタリー袋はどちらか選択必須
  const sanSel = state.gradeSelections['sanitary'];
  if (!sanSel) missing.push('サニタリー用ゴミ袋（どちらか選択）');

  // ティッシュはどちらか選択必須
  const tissueSel = state.gradeSelections['tissue'];
  if (!tissueSel) missing.push('ティッシュペーパー（どちらか選択）');

  // 室内消臭スプレーはどちらか選択必須
  const roomDeodSel = state.gradeSelections['roomdeodor'];
  if (!roomDeodSel) missing.push('室内消臭スプレー（ファブリーズ or 清水香）');

  // グレードグループ（必須扱い）は数量1以上必要
  GRADE_GROUPS.forEach(g => {
    const qty = state.gradeQty[g.id] || 0;
    if (qty <= 0) missing.push(g.name);
  });

  // 歯ブラシ
  if (!state.quantities['_toothbrush'] || state.quantities['_toothbrush'] <= 0) {
    missing.push('歯ブラシ');
  }

  // 食器洗剤
  if (!state.quantities['_dishsoap'] || state.quantities['_dishsoap'] <= 0) {
    missing.push('食器用洗剤セット');
  }

  return missing;
}

function showValidationError(missing) {
  const existing = document.getElementById('validation-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'validation-toast';
  toast.style.cssText = `
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    max-width:640px; width:calc(100% - 32px);
    background:#fef2f2; border:1.5px solid #fca5a5; border-radius:14px;
    padding:14px 16px; z-index:300; box-shadow:0 4px 20px rgba(0,0,0,.12);
    animation: slideUp .3s ease;
  `;
  toast.innerHTML = `
    <div style="font-weight:700;color:#dc2626;font-size:13px;margin-bottom:8px;">⚠️ 以下の必須項目が未入力です</div>
    <ul style="margin:0;padding-left:16px;font-size:12px;color:#7f1d1d;line-height:1.8;">
      ${missing.map(n => `<li>${n}</li>`).join('')}
    </ul>
    <div style="font-size:10px;color:#ef4444;margin-top:8px;">各ステップに戻って数量を入力してください</div>
  `;
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
}

// ================================================================
function changeQty(id, delta, customMin) {
  const min = customMin || getItemMin(id);
  const isMandatory = MANDATORY_IDS.includes(id);
  if (isMandatory && delta < 0) return;
  const cur = state.quantities[id] || 0;
  const next = Math.max(0, cur + delta * min);
  if (next === 0) delete state.quantities[id];
  else state.quantities[id] = next;
  render();
}

function changeGradeQty(groupId, delta) {
  const cur = state.gradeQty[groupId] || 0;
  state.gradeQty[groupId] = Math.max(0, cur + delta);
  render();
}

function setGrade(groupId, grade) {
  state.gradeSelections[groupId] = grade;
  render();
}

function selectTP(type) {
  delete state.quantities['S0235'];
  delete state.quantities['S0048'];
  const mapped = type === 'a' ? '4r' : (type === 'b' ? '12r' : type);
  state.gradeSelections['toiletpaper'] = mapped;
  if (mapped === '4r') state.quantities['S0235'] = 1;
  else state.quantities['S0048'] = 1;
  render();
}

  delete state.quantities['S0045'];
  delete state.quantities['S0080'];
  const mapped = type === 'a' ? 'black' : (type === 'b' ? 'hotel' : type);
  state.gradeSelections['sanitary'] = mapped;
  if (mapped === 'black') state.quantities['S0045'] = 1;
  else state.quantities['S0080'] = 100;
  render();
}

function renderStep11() {
  // 確認・送信
  const rows = [];
  for (const [id, qty] of Object.entries(state.quantities)) {
    const item = ITEMS[id] || SET_ITEMS[id];
    if (!item || qty <= 0) continue;
    if (id === '_toothbrush') {
      const opt = TOOTHBRUSH_OPTIONS.find(o => o.grade === state.gradeSelections.toothbrush);
      if (opt) rows.push({ name: opt.name, qty, total: opt.price * qty, unit: opt.unit });
      continue;
    }
    if (id === '_dishsoap') {
      const opt = DISH_SOAP_OPTIONS.find(o => o.grade === state.gradeSelections.dishsoap);
      if (opt) rows.push({ name: opt.name, qty, total: opt.totalPrice * qty, unit: 'セット' });
      continue;
    }
    const hc = state.hostChoice[id];
    if (item.hostPrep && hc === 'host') continue;
    rows.push({ name: item.name, qty, total: item.price * qty, unit: item.unit });
  }
  GRADE_GROUPS.forEach(g => {
    const qty = state.gradeQty[g.id] || 0;
    if (qty <= 0) return;
    const opt = g.options.find(o => o.grade === state.gradeSelections[g.id]);
    if (!opt) return;
    rows.push({ name: g.name + '（' + opt.label + '）', qty, total: opt.totalPrice * qty, unit: 'セット' });
  });
  const total = calcTotal();
  return (
    '<div class="section-head"><div class="section-title">確認・送信</div><div class="section-sub">内容を確認して送信してください</div></div>' +
    '<div class="summary-card">' +
      '<div style="font-size:12px;font-weight:700;color:#6b7280;margin-bottom:12px;">📦 物件情報</div>' +
      '<div class="summary-row"><span class="summary-name">物件名</span><span class="summary-price">' + (state.property.name||'—') + '</span></div>' +
      '<div class="summary-row"><span class="summary-name">物件番号</span><span class="summary-price" style="font-family:var(--mono)">' + (state.property.number||'—') + '</span></div>' +
      '<div class="summary-row"><span class="summary-name">担当者</span><span class="summary-price">' + (state.property.contact||'—') + '</span></div>' +
    '</div>' +
    '<div class="summary-card">' +
      '<div style="font-size:12px;font-weight:700;color:#6b7280;margin-bottom:12px;">🛒 発注品目一覧</div>' +
      rows.map(r =>
        '<div class="summary-row">' +
          '<span class="summary-name">' + r.name + '</span>' +
          '<span class="summary-qty">' + r.qty + r.unit + '</span>' +
          '<span class="summary-price">' + fmt(r.total) + '</span>' +
        '</div>'
      ).join('') +
    '</div>' +
    '<div class="summary-total">' +
      '<div class="total-label">TOTAL ESTIMATE</div>' +
      '<div class="total-amount">' + fmt(total) + '</div>' +
    '</div>' +
    '<button class="submit-btn" id="submit-btn" onclick="submitOrder()">📤 送信する</button>'
  );
}

function render() {
  const main = document.getElementById('main-content');
  main.innerHTML = STEP_RENDERERS[state.currentStep]();

  // footer
  document.getElementById('nav-total').textContent = fmt(calcTotal());
  document.getElementById('step-label').textContent = `STEP ${state.currentStep+1} / ${STEPS.length}`;
  document.getElementById('btn-back').style.visibility = state.currentStep === 0 ? 'hidden' : 'visible';
  const btnNext = document.getElementById('btn-next');
  if (state.currentStep === STEPS.length - 1) {
    btnNext.textContent = '✓ 確認完了';

    btnNext.textContent = '次へ →';
    btnNext.style.display = '';

  // progress tabs
  const tabsEl = document.getElementById('progress-tabs');
  tabsEl.innerHTML = STEPS.map((s,i) => {
    let cls = '';
    if (i === state.currentStep) cls = 'active';
    else if (i < state.currentStep) cls = 'done';
    return `<div class="tab-item ${cls}" onclick="goStep(${i})">${s}</div>`;
  }).join('');

  // scroll active tab into view
  const activeTab = tabsEl.querySelector('.tab-item.active');
  if (activeTab) activeTab.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

function goStep(i) {
  state.currentStep = i;
  window.scrollTo(0,0);
  render();
}

function nextStep() {
  if (state.currentStep < STEPS.length - 1) {
    state.currentStep++;
    window.scrollTo(0,0);
    render();
  }
}

function prevStep() {
  if (state.currentStep > 0) {
    state.currentStep--;
    window.scrollTo(0,0);
    render();
  }
}

// ================================================================
// SUBMIT
// ================================================================
async function submitOrder() {
  // バリデーション
  const missing = validateMandatory();
  if (missing.length > 0) {
    showValidationError(missing);
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> 送信中...`;

  const payload = buildPayload();

  if (!state.webhookUrl) {
    // webhook未設定時はJSONダウンロード
    downloadJson(payload);
    showSuccess(false);
    return;
  }

  try {
    await fetch(state.webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      mode: 'no-cors'
    });
    showSuccess(true);
  } catch (e) {
    console.error(e);
    downloadJson(payload);
    showSuccess(false);
  }
}

function buildPayload() {
  const timestamp = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
  const items = [];

  for (const [id, qty] of Object.entries(state.quantities)) {
    if (qty <= 0) continue;
    let item, name, price, unit, grade = null;
    if (id === '_toothbrush') {
      const opt = TOOTHBRUSH_OPTIONS.find(o => o.grade === state.gradeSelections.toothbrush);
      if (!opt) continue;
      name = opt.name; price = opt.price; unit = opt.unit; grade = opt.label;
    } else if (id === '_dishsoap') {
      const opt = DISH_SOAP_OPTIONS.find(o => o.grade === state.gradeSelections.dishsoap);
      if (!opt) continue;
      name = opt.name; price = opt.totalPrice; unit = 'セット'; grade = opt.label;
    } else {
      item = ITEMS[id] || SET_ITEMS[id];
      if (!item) continue;
      const hc = state.hostChoice[id];
      if (item.hostPrep && hc === 'host') continue;
      name = item.name; price = item.price; unit = item.unit;
    }
    items.push({ id, name, qty, unitPrice: price, subtotal: price * qty, unit, grade, hostPrepare: false });
  }

  GRADE_GROUPS.forEach(g => {
    const qty = state.gradeQty[g.id] || 0;
    if (qty <= 0) return;
    const opt = g.options.find(o => o.grade === state.gradeSelections[g.id]);
    if (!opt) return;
    items.push({ id: g.id, name: `${g.name}（${opt.label}）`, qty, unitPrice: opt.totalPrice, subtotal: opt.totalPrice * qty, unit: 'セット', grade: opt.label, hostPrepare: false });
  });

  return {
    timestamp,
    property: state.property,
    items,
    totalAmount: calcTotal(),
    summary: `【弊社自動補充】${state.property.name}（${state.property.number}） 合計${fmt(calcTotal())} ${items.length}品目`
  };
}

function downloadJson(payload) {
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `order_${payload.property.number || 'draft'}_${Date.now()}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function showSuccess(sent) {
  document.getElementById('main-content').innerHTML = `
    <div class="success-box">
      <div class="success-icon">${sent ? '✅' : '📥'}</div>
      <div class="success-title">${sent ? '発注を送信しました' : 'JSONをダウンロードしました'}</div>
      <div class="success-sub">
        ${sent
          ? `Googleスプレッドシートへの記録とSlack通知が実行されました。<br>担当者をご確認ください。`
          : `Webhook URLが未設定のため、発注データをJSONファイルとして保存しました。<br>n8nのWebhookノードにこのJSONを手動で送信するか、URLを設定して再送してください。`
        }
        <br><br>
        <button class="submit-btn" style="max-width:200px;margin:0 auto;" onclick="location.reload()">🔄 最初に戻る</button>
      </div>
    </div>`;
  document.querySelector('.footer-nav').style.display = 'none';
}

// ================================================================
// INIT
// ================================================================
render();
</script>
