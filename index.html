<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>初回セット・補充備品発注フォーム | 民泊管理バンク</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#215387;
  --brand-light:#3174b5;
  --brand-base:#eef8ff;
  --brand-accent:#d7f0ff;
  --danger:#ea433c;
  --amber:#d97706;--amber-light:#fffbeb;
  --green:#16a34a;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --bg:#f8fafc;--card:#fff;--border:#e2e8f0;
  --text:#1e293b;--text-sub:#64748b;
  --mono:'SF Mono',Monaco,Consolas,monospace;
  --radius:14px;
  /* alias for JS compatibility */
  --accent:var(--brand);
  --accent-light:var(--brand-base);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:120px}

/* ── ヘッダー ── */
.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.header-inner{max-width:720px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-logo{display:flex;align-items:center;gap:12px}
.logo-icon{background:var(--brand);padding:9px;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(33,83,135,0.22);flex-shrink:0}
.logo-icon svg{width:22px;height:22px;color:#fff;display:block}
.logo-title{font-size:16px;font-weight:900;color:var(--text);letter-spacing:-.4px}
.logo-sub{font-size:10px;font-weight:700;color:#94a3b8;margin-top:1px}
.progress-bar-wrap{display:flex;align-items:center;gap:10px;background:#fff;padding:8px 16px;border-radius:14px;border:1px solid #f1f5f9;box-shadow:0 1px 4px rgba(0,0,0,.04);min-width:160px}
.progress-label{font-size:9px;font-weight:900;color:#cbd5e1;text-transform:uppercase;letter-spacing:.12em;white-space:nowrap}
.progress-track{flex:1;height:7px;background:#f1f5f9;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-light));border-radius:99px;transition:width .6s cubic-bezier(.65,0,.35,1)}
.progress-pct{font-size:13px;font-weight:900;color:var(--brand);min-width:32px;text-align:right}

/* ── メイン ── */
.main{padding:20px 16px;max-width:720px;margin:0 auto}
.section-head{margin-bottom:20px}
.section-title{font-size:22px;font-weight:900;letter-spacing:-.5px}
.section-sub{font-size:12px;color:var(--text-sub);margin-top:4px}
.subsection{margin-bottom:24px}
.subsection-title{font-size:10px;font-weight:900;color:var(--text-sub);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;padding-left:2px}

/* ── アイテムカード ── */
.item-card{background:var(--card);border:1px solid #e8edf2;border-radius:16px;padding:14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.item-card.has-qty{border-color:var(--brand)}

.item-card.host-mode .qty-control{opacity:.35;pointer-events:none}
.item-img{width:64px;height:64px;border-radius:10px;object-fit:contain;background:#fff;border:1.5px solid var(--border);flex-shrink:0;padding:4px}
.item-body{flex:1;min-width:0}
.badge-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.badge-id{background:#f1f5f9;color:#475569;font-family:var(--mono)}
.badge-essential{background:#dbeafe;color:#1e40af}
.badge-recommend{background:#fef9c3;color:#854d0e}
.badge-family{background:#ecfdf5;color:#065f46}
.badge-host{background:var(--brand-base);color:var(--brand)}
.item-name{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:2px}
.item-brand{font-size:11px;color:var(--text-sub);margin-bottom:4px}
.item-price{font-size:14px;font-weight:900;font-family:var(--mono);color:var(--brand)}
.item-price-sub{font-size:10px;color:var(--text-sub)}

/* ── ホストトグル ── */
.host-toggle-wrap{margin-top:8px}
.host-toggle-required{font-size:11px;color:var(--amber);background:var(--amber-light);padding:6px 10px;border-radius:8px;font-weight:600;margin-bottom:6px;border:1.5px solid #fde68a}
.host-toggle{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--border);font-size:11px}
.host-toggle-btn{flex:1;padding:6px 8px;text-align:center;cursor:pointer;transition:all .15s;font-weight:600;line-height:1.3}
.host-toggle-btn.active-us{background:var(--brand);color:#fff}
.host-toggle-btn.active-host{background:var(--danger);color:#fff}

/* ── 数量コントロール ── */
.qty-control{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.qty-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:18px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;line-height:1}
.qty-btn:hover:not(:disabled){border-color:var(--brand);color:var(--brand)}
.qty-btn:disabled{opacity:.3;cursor:not-allowed}
.qty-num{font-size:16px;font-weight:900;font-family:var(--mono);min-width:28px;text-align:center}
.qty-unit{font-size:10px;color:var(--text-sub)}

/* ── セットカード ── */
.set-card{background:var(--card);border:1px solid #e8edf2;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.set-card.has-qty{border-color:var(--brand)}

.set-title{font-size:13px;font-weight:800;margin-bottom:8px}
.set-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.set-item{display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:8px;padding:6px 8px;flex:1;min-width:140px}
.set-item-img{width:40px;height:40px;border-radius:6px;object-fit:contain;background:#fff;border:1.5px solid var(--border);flex-shrink:0;padding:2px}
.set-item-info{min-width:0}
.set-item-id{font-size:9px;font-family:var(--mono);color:#94a3b8}
.set-item-name{font-size:11px;font-weight:600;line-height:1.3}
.set-item-price{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--brand)}
.set-footer{display:flex;align-items:center;justify-content:space-between}
.set-total{font-size:15px;font-weight:900;font-family:var(--mono);color:var(--brand)}
.set-total-sub{font-size:10px;color:var(--text-sub)}

/* ── 選択カード（2択・3択） ── */
.choice-card-wrap{background:var(--card);border:1px solid #e8edf2;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.choice-card-wrap.has-sel{border-color:var(--brand)}
.choice-label{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.choice-title{font-size:14px;font-weight:800;margin-bottom:12px}
.choice-opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.choice-opt{flex:1;min-width:120px;border:1.5px solid var(--border);border-radius:12px;padding:10px;cursor:pointer;transition:all .15s;background:#fff}
.choice-opt.active{border-color:var(--brand);background:var(--brand-base)}
.choice-opt-img{width:100%;height:56px;object-fit:contain;border-radius:6px;background:var(--bg);margin-bottom:6px}
.choice-opt-badges{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.choice-opt-name{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:4px}
.choice-opt-desc{font-size:10px;color:var(--text-sub);margin-bottom:4px}
.choice-opt-price{font-size:13px;font-weight:900;font-family:var(--mono);color:var(--brand)}
.choice-opt-check{font-size:10px;color:var(--brand);font-weight:700;margin-top:4px}
.choice-qty-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:10px;padding:10px 14px}
.choice-qty-label{font-size:13px;font-weight:700}
.choice-qty-ctrl{display:flex;align-items:center;gap:8px}
.choice-warn{font-size:11px;color:var(--amber);background:var(--amber-light);padding:8px 12px;border-radius:8px;font-weight:600}
.choice-opt-btn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center}
.choice-opt-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-base)}

/* ── グレードカード ── */
.grade-card{background:var(--card);border:1px solid #e8edf2;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grade-card.selected{border-color:var(--brand)}
.grade-label{font-size:10px;font-weight:700;color:var(--purple);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.grade-name{font-size:14px;font-weight:800;margin-bottom:10px}
.grade-options{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.grade-opt-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.grade-opt-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.grade-detail{display:flex;align-items:flex-start;gap:10px}
.grade-img{width:56px;height:56px;border-radius:8px;object-fit:contain;background:#fff;border:1.5px solid var(--border);flex-shrink:0;padding:3px}
.grade-info{flex:1;min-width:0}
.grade-price{font-size:15px;font-weight:900;font-family:var(--mono);color:var(--brand);margin-top:4px}
.host-note{font-size:10px;color:var(--amber);background:var(--amber-light);padding:4px 8px;border-radius:6px;margin-top:4px}

/* ── フッター ── */
.footer{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:100}
.footer-inner{max-width:720px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
.total-wrap .total-label{font-size:10px;color:var(--text-sub);font-weight:700}
.total-wrap .total-amount{font-size:18px;font-weight:900;font-family:var(--mono);color:var(--brand)}
.nav-btns{display:flex;gap:8px}
.btn-back{padding:10px 20px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:var(--text)}
.btn-next{padding:10px 24px;border-radius:10px;border:none;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.btn-submit{padding:16px 24px;border-radius:14px;border:none;background:var(--brand);color:#fff;font-size:16px;font-weight:800;cursor:pointer;width:100%;margin-top:20px;box-shadow:0 4px 16px rgba(33,83,135,0.25);transition:all .15s}
.btn-submit:hover{background:var(--brand-light);transform:translateY(-1px)}
.btn-submit.disabled{background:#cbd5e1;color:#94a3b8;cursor:not-allowed;box-shadow:none;transform:none}

/* ── フォーム ── */
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:700;margin-bottom:6px;display:block;color:var(--text)}
.form-label span.req{color:var(--danger);margin-left:2px}
.form-input{width:100%;padding:12px 14px;border:1.5px dashed #f97316;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:#fff}
.form-input:focus{border-color:var(--brand);border-style:solid}
.form-card{background:#fff;border-radius:20px;border:1.5px solid var(--border);box-shadow:0 1px 6px rgba(0,0,0,.04);padding:20px 24px;margin-bottom:20px}
.form-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.form-card-title{font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px}
.form-card-badge{font-size:9px;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;background:#f1f5f9;padding:3px 8px;border-radius:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}

/* ── ダッシュボード タスクカード ── */
.task-card{display:flex;align-items:center;gap:14px;padding:16px 18px;background:#fff;border:1.5px solid var(--border);border-radius:16px;margin-bottom:10px;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.task-card:hover{border-color:var(--brand);box-shadow:0 2px 8px rgba(33,83,135,.1)}
.task-card.done{border-color:var(--brand);background:var(--brand-base)}
.task-card-icon{font-size:22px;line-height:1;flex-shrink:0}
.task-card-body{flex:1}
.task-card-title{font-size:14px;font-weight:700}
.task-card-sub{font-size:11px;color:var(--text-sub);margin-top:2px}
.task-card-sub.done-text{color:var(--brand);font-weight:600}
.task-card-arrow{font-size:18px;color:var(--text-sub)}
.section-label{font-size:10px;font-weight:900;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 8px}

/* ── サマリー ── */
.summary-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.summary-row{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.summary-row:last-child{border-bottom:none}
.summary-name{flex:1;font-size:12px}
.summary-qty{font-size:11px;color:var(--text-sub);white-space:nowrap;font-family:var(--mono)}
.summary-price{font-size:12px;font-weight:700;font-family:var(--mono);white-space:nowrap}
.summary-total{background:var(--brand);color:#fff;border-radius:16px;padding:18px;text-align:center;margin-bottom:16px}
.total-label{font-size:11px;opacity:.8;margin-bottom:4px}
.total-amount{font-size:28px;font-weight:900;font-family:var(--mono)}
.mandatory-banner{background:var(--purple-light);border:1.5px solid var(--purple);border-radius:14px;padding:12px 14px;margin-bottom:16px}
.mandatory-banner-title{font-size:12px;font-weight:800;color:var(--purple);margin-bottom:4px}
.mandatory-banner-sub{font-size:11px;color:#5b21b6}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:480px){.choice-opts{flex-direction:column}.main{padding:12px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
        </svg>
      </div>
      <div>
        <div class="logo-title">初回セット・補充備品発注フォーム</div>
        <div class="logo-sub">民泊管理バンク・ホスト様用発注シート</div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label">PROGRESS</div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </div>
  </div>
</div>
<div class="main" id="main-content"></div>
<div class="footer">
  <div class="footer-inner">
    <div class="total-wrap">
      <div class="total-label">合計金額（目安）</div>
      <div class="total-amount" id="total-display">￥0</div>
    </div>
    <div class="nav-btns" id="nav-btns-area">
      <button class="btn-back" id="btn-back" onclick="prevStep()">← 戻る</button>
      <button class="btn-next" id="btn-next" onclick="nextStep()">次へ →</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>

  'S0202':{id:'S0202',name:'サントリー ウイスキー 角瓶 700ml',brand:'サントリー',price:2390,min:1,unit:'本',cat:'アルコール',img:'https://m.media-amazon.com/images/I/61bM6ZheZfL._SL1000_.jpg'},
  'S0203':{id:'S0203',name:'サッポロ 濃いめのレモンサワーの素 1800ml',brand:'サッポロ',price:2180,min:1,unit:'本',cat:'アルコール',img:'https://m.media-amazon.com/images/I/71Rega-sSfL._SL1500_.jpg'},
  'S0204':{id:'S0204',name:'九州五蔵 飲み比べセット×5本',brand:'-',price:13800,min:1,unit:'セット',cat:'アルコール',img:'https://m.media-amazon.com/images/I/61Y91aR9fuL._AC_SL1000_.jpg'},

  {key:'fixed',  label:'初回必須セット①',  fn:function(){return renderStep1();}},
  {key:'select', label:'初回必須セット②',  fn:function(){return renderStep2();}},

  {key:'aroma',     label:'芳香・室内備品',   fn:function(){return renderStep9();}},

function renderStep12() {
  const total = calcTotal();
  let rows = '';
  // 洗濯洗剤
  if (state.laundryType === 'gel' && (state.quantities['S0232']||0) > 0) {
    const gi = ITEMS['S0232'];
    if (gi) rows += '<div class="summary-row"><div class="summary-name"><span style="font-family:var(--mono);font-size:10px;color:#94a3b8">S0232</span> '+gi.name+'</div><div class="summary-qty">'+(state.quantities['S0232']||0)+' 個</div><div class="summary-price">'+fmt(gi.price*(state.quantities['S0232']||0))+'</div></div>';
  }
  // 詰替選択
  for (const [k, def] of Object.entries(REFILL_CHOICE_DEFS)) {
    if (k === 'laundry_liquid' && state.laundryType !== 'liquid') continue;
    const sel = state.refillChoices[k];
    const qty = state.refillQty[k] || 0;
    if (sel && qty > 0) {
      const opt = def.opts.find(o=>o.key===sel);
      if (opt) {
        const ep = opt.extraId ? opt.extraPrice : 0;
        const tp = (def.base.price + ep) * qty;
        rows += '<div class="summary-row"><div class="summary-name">'+def.title+'（'+opt.label+'）</div><div class="summary-qty">'+qty+' セット</div><div class="summary-price">'+fmt(tp)+'</div></div>';
      }
    }
  }
  // グレードグループ
  for (const g of GRADE_GROUPS) {
    const sel = state.gradeSelections[g.id];
    const qty = state.gradeQty[g.id] || 0;
    if (sel && qty > 0) {
      const opt = g.options.find(o=>o.grade===sel);
      if (opt) {
        const p = opt.items.reduce((s,i)=>s+i.price,0);
        rows += '<div class="summary-row"><div class="summary-name">'+g.name+'（'+opt.label+'）</div><div class="summary-qty">'+qty+' セット</div><div class="summary-price">'+fmt(p*qty)+'</div></div>';
      }
    }
  }
  // セット
  for (const [k, def] of Object.entries(SET_DEFS)) {
    const qty = state.setQty[k] || 0;
    if (qty > 0) {
      const actualP = def.items.reduce((s,item)=>s+(state.hostChoice[item.id]==='host'?0:item.price),0);
      rows += '<div class="summary-row"><div class="summary-name">'+def.title+'</div><div class="summary-qty">'+qty+' セット</div><div class="summary-price">'+fmt(actualP*qty)+'</div></div>';
    }
  }
  // 選択カード
  for (const [k, def] of Object.entries(CHOICE_DEFS)) {
    const sel = state.choiceSelections[k];
    const qty = state.choiceQty[k] || 0;
    if (sel && qty > 0) {
      const opt = def.opts.find(o=>o.key===sel);
      if (opt) {
        const selMin = opt.ids ? (opt.ids.filter(i=>!i.startsWith('MUJI_')).map(i=>ITEMS[i]?.min||1).find(m=>m>1)||1) : 1;
        const realQty = qty * selMin;
        const qtyLabel = selMin > 1 ? qty+' セット ('+realQty+(opt.unit||'個')+')' : qty+' '+(opt.unit||'個');
        rows += '<div class="summary-row"><div class="summary-name">'+def.title+'（'+opt.label+'）</div><div class="summary-qty">'+qtyLabel+'</div><div class="summary-price">'+fmt(opt.price*qty)+'</div></div>';
      }
    }
  }
  // 通常品目
  for (const [id, qty] of Object.entries(state.quantities)) {
    if (qty <= 0) continue;
    const item = ITEMS[id];
    if (item) {
      const displayQty = item.min>1 ? Math.round(qty/item.min)+' セット ('+qty+item.unit+')' : qty+' '+item.unit;
      rows += '<div class="summary-row"><div class="summary-name"><span style="font-family:var(--mono);font-size:10px;color:#94a3b8">'+id+'</span> '+item.name+'</div><div class="summary-qty">'+displayQty+'</div><div class="summary-price">'+fmt(item.price*qty)+'</div></div>';
    }
  }
  if (!rows) rows = '<div style="text-align:center;padding:20px;color:var(--text-sub)">選択された品目がありません</div>';
  return '<div class="section-head"><div class="section-title">確認・送信</div><div class="section-sub">内容をご確認の上、発注を送信してください</div></div>'
    + '<div class="summary-card"><div style="font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:8px">物件情報</div>'
    + '<div class="summary-row"><div class="summary-name">物件番号</div><div class="summary-price">'+(state.property.number||'—')+'</div></div>'
    + '<div class="summary-row"><div class="summary-name">物件名</div><div class="summary-price">'+(state.property.name||'—')+'</div></div>'
    + '<div class="summary-row"><div class="summary-name">担当者</div><div class="summary-price">'+(state.property.contact||'—')+'</div></div>'
    + '<div class="summary-row"><div class="summary-name">メール</div><div class="summary-price">'+((state.property.email)||'—')+'</div></div>'
    + '</div>'
    + '<div class="summary-total"><div class="total-label">合計金額（目安）</div><div class="total-amount">'+fmt(total)+'</div></div>'
    + '<div class="summary-card"><div style="font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:8px">発注品目</div>'+rows+'</div>'
    + '<button onclick="openStep(\'hostInfo\')" class="btn-submit" style="width:100%;margin-top:16px">📦 この内容で発注する</button>';
}

const STEPS = ['ダッシュボード'];
const STEP_RENDERERS = [function(){return renderDashboard();}];

// ─── render / navigation ───
function render(scrollToTop) {
  const mc = document.getElementById('main-content');
  const v = state.view;
  let html = '';
  if (v === 'dashboard') {
    html = renderDashboard();
    // タブ・ヘッダーを隠す
    (function(){const _tb=document.getElementById('tabs');if(_tb)_tb.innerHTML='';})();
    (function(){const _sl=document.getElementById('step-label');if(_sl)_sl.textContent='';})();
    (function(){const _b=document.getElementById('btn-back');if(_b)_b.style.display='none';})();
    (function(){const _b=document.getElementById('btn-next');if(_b)_b.style.display='none';})();
  } else if (v === 'step') {
    const stepDef = [...REQUIRED_STEPS, RECOMMEND_STEP, FAMILY_STEP].find(s => s.key === state.currentStepKey);
    if (stepDef) {
      html = stepDef.fn();
      (function(){const _sl=document.getElementById('step-label');if(_sl)_sl.textContent=stepDef.label;})();
    }
    (function(){const _tb=document.getElementById('tabs');if(_tb)_tb.innerHTML='';})();
    (function(){const _b=document.getElementById('btn-back');if(_b)_b.style.display='none';})();
    (function(){const _b=document.getElementById('btn-next');if(_b)_b.style.display='none';})();
  } else if (v === 'optList') {
    html = renderOptionalList();
    (function(){const _sl=document.getElementById('step-label');if(_sl)_sl.textContent='任意追加品目';})();
    (function(){const _tb=document.getElementById('tabs');if(_tb)_tb.innerHTML='';})();
    (function(){const _b=document.getElementById('btn-back');if(_b)_b.style.display='none';})();
    (function(){const _b=document.getElementById('btn-next');if(_b)_b.style.display='none';})();
  } else if (v === 'optCat') {
    const cat = OPT_CATS.find(c => c.key === state.currentOptCat);
    if (cat) {
      html = cat.fn();
      (function(){const _sl=document.getElementById('step-label');if(_sl)_sl.textContent=cat.label;})();
    }
    (function(){const _tb=document.getElementById('tabs');if(_tb)_tb.innerHTML='';})();
    (function(){const _b=document.getElementById('btn-back');if(_b)_b.style.display='none';})();
    (function(){const _b=document.getElementById('btn-next');if(_b)_b.style.display='none';})();
  } else if (v === 'confirm') {
    html = renderStep12();
    (function(){const _sl=document.getElementById('step-label');if(_sl)_sl.textContent='確認・送信';})();
    (function(){const _tb=document.getElementById('tabs');if(_tb)_tb.innerHTML='';})();
    (function(){const _b=document.getElementById('btn-back');if(_b)_b.style.display='none';})();
    (function(){const _b=document.getElementById('btn-next');if(_b)_b.style.display='none';})();
  } else if (v === 'hostInfo') {
    html = renderHostInfo();
    (function(){const _sl=document.getElementById('step-label');if(_sl)_sl.textContent='ホスト様情報の入力';})();
    (function(){const _tb=document.getElementById('tabs');if(_tb)_tb.innerHTML='';})();
    (function(){const _b=document.getElementById('btn-back');if(_b)_b.style.display='none';})();
    (function(){const _b=document.getElementById('btn-next');if(_b)_b.style.display='none';})();
  }
  mc.innerHTML = html;
  document.getElementById('total-display').textContent = fmt(calcTotal());

  // プログレスバー更新
  const totalSteps = REQUIRED_STEPS.length + 2;
  const doneSteps = [...REQUIRED_STEPS, RECOMMEND_STEP, FAMILY_STEP].filter(s => state.completedSteps[s.key]).length;
  const pct = Math.round(doneSteps / totalSteps * 100);
  const fillEl = document.getElementById('progress-fill');
  const pctEl = document.getElementById('progress-pct');
  if (fillEl) fillEl.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';

  // フッターボタンをviewに応じて更新
  const btnArea = document.getElementById('nav-btns-area');
  const BACK_DASH = '<button class="btn-back" onclick="openStep(\'dashboard\')">← 戻る</button>';
  const BACK_OPT  = '<button class="btn-back" onclick="openStep(\'optList\')">← 戻る</button>';
  if (btnArea) {
    if (state.view === 'dashboard') {
      btnArea.innerHTML = '';
    } else if (state.view === 'step') {
      const needsValidate = state.currentStepKey === 'select';
      const doneCall = "completeStep('" + state.currentStepKey + "'," + (needsValidate?'true':'false') + ")";
      btnArea.innerHTML = BACK_DASH + '<button class="btn-next" onclick="' + doneCall + '">完了 ✓</button>';
    } else if (state.view === 'optList') {
      btnArea.innerHTML = '';
    } else if (state.view === 'optCat') {
      const doneCall2 = "completeOptCat('" + state.currentOptCat + "')";
      btnArea.innerHTML = BACK_OPT + '<button class="btn-next" onclick="' + doneCall2 + '">完了 ✓</button>';
    } else if (state.view === 'confirm') {
      btnArea.innerHTML = BACK_DASH;
    } else if (state.view === 'hostInfo') {
      btnArea.innerHTML = '<button class="btn-back" onclick="openStep(\'confirm\')">← 戻る</button>';
    }
  }

  if (scrollToTop) window.scrollTo({top:0,behavior:'smooth'});
}

function openStep(key) {
  if (key === 'dashboard') {
    state.view = 'dashboard';
  } else if (key === 'optList') {
    state.view = 'optList';
  } else if (key === 'confirm') {
    state.view = 'confirm';
  } else if (key === 'hostInfo') {
    state.view = 'hostInfo';
  } else {
    state.view = 'step';
    state.currentStepKey = key;
  }
  render(true);
}

function openOptCat(catKey) {
  state.view = 'optCat';
  state.currentOptCat = catKey;
  render(true);
}

function completeStep(key, validate) {
  if (validate) {
    const errs = key === 'step2' ? validateStep2() : validateStep1();
    if (errs.length > 0) { showToast('⚠ ' + errs[0]); return; }
  }
  if (key === 'info') {
    if (!state.property.number.trim()) { showToast('物件番号を入力してください'); return; }
    if (!/^[0-9]{4}$/.test(state.property.number.trim())) { showToast('物件番号は4桁の数字を入力してください'); return; }
    if (!state.property.name.trim()) { showToast('物件名を入力してください'); return; }
    if (!(state.property.email||'').trim()) { showToast('連絡先メールアドレスを入力してください'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((state.property.email||'').trim())) { showToast('メールアドレスの形式が正しくありません'); return; }
  }
  if (key === 'laundry_type') {
    if (!state.laundryType) { showToast('洗濯洗剤の種類を選択してください'); return; }
    if (state.laundryType === 'liquid' && !state.refillChoices['laundry_liquid']) { showToast('液体洗剤のタイプを選択してください'); return; }
  }
  state.completedSteps[key] = true;
  state.view = 'dashboard';
  render(true);
}

function completeOptCat(catKey) {
  state.completedSteps[catKey] = true;
  state.view = 'optList';
  render(true);
}


function goStep(i){state.currentStep=i;render(true);}
function prevStep(){if(state.currentStep>0){state.currentStep--;render(true);}}
function nextStep(){
  if (state.currentStep===0 && !state.property.number.trim()){showToast('物件番号を入力してください');return;}
  if (state.currentStep===0 && !/^[0-9]{4}$/.test(state.property.number.trim())){showToast('物件番号は4桁の数字を入力してください');return;}
  if (state.currentStep===0 && !state.property.name.trim()){showToast('物件名を入力してください');return;}
  if (state.currentStep===0 && !(state.property.email||'').trim()){showToast('連絡先メールアドレスを入力してください');return;}
  if (state.currentStep===2){
    const errs = validateStep2();
    if (errs.length>0){showToast('⚠ '+errs[0]);return;}
  }
  if (state.currentStep<STEPS.length-1){state.currentStep++;render(true);}
}

// ─── 送信 ───
function sendOrderEmail() {
  const hi = state.hostInfo;
  if (!hi.propName) { showToast('物件名を入力してください'); return; }
  if (!hi.owner)    { showToast('ご契約者様名を入力してください'); return; }
  if (!hi.email)    { showToast('連絡先メールアドレスを入力してください'); return; }

  const total = calcTotal();
  let body = '【初回セット・補充備品発注】\n';
  body += '============================\n';
  body += '物件名：' + hi.propName + '\n';
  body += '物件番号：' + (hi.propNum||'—') + '\n';
  body += 'ご契約者様名：' + hi.owner + '\n';
  body += '担当者名：' + (hi.contact||'—') + '\n';
  body += '連絡先メール：' + hi.email + '\n';
  body += '============================\n';
  body += '合計金額（目安）：' + fmt(total) + '\n';
  body += '============================\n\n';
  body += '【発注品目】\n';

  // グレードグループ
  for (const g of GRADE_GROUPS) {
    const sel = state.gradeSelections[g.id];
    const qty = state.gradeQty[g.id]||0;
    if (sel && qty>0) {
      const opt = g.options.find(o=>o.grade===sel);
      if (opt) {
        const p = opt.items.reduce((s,i)=>s+i.price,0);
        body += '■ '+g.name+'（'+opt.label+'） x'+qty+'セット '+fmt(p*qty)+'\n';
        opt.items.forEach(i=>{ body += '  - ['+i.id+'] '+i.name+'\n'; });
      }
    }
  }
  // セット
  for (const [k,def] of Object.entries(SET_DEFS)) {
    const qty = state.setQty[k]||0;
    if (qty>0) {
      const p = def.items.reduce((s,i)=>s+(state.hostChoice[i.id]==='host'?0:i.price),0);
      body += '■ '+def.title+' x'+qty+'セット '+fmt(p*qty)+'\n';
      def.items.forEach(i=>{
        const hc = state.hostChoice[i.id]==='host'?'（ホスト様準備）':'';
        body += '  - ['+i.id+'] '+i.name+hc+'\n';
      });
    }
  }
  // 選択カード
  for (const [k,def] of Object.entries(CHOICE_DEFS)) {
    const sel = state.choiceSelections[k];
    const qty = state.choiceQty[k]||0;
    if (sel && qty>0) {
      const opt = def.opts.find(o=>o.key===sel);
      if (opt) body += '■ '+def.title+'（'+opt.label+'） x'+qty+' '+fmt(opt.price*qty)+'\n';
    }
  }
  // 通常品目
  for (const [id,qty] of Object.entries(state.quantities)) {
    if (qty<=0) continue;
    const item = ITEMS[id];
    if (item) {
      const hc = state.hostChoice[id]==='host'?'（ホスト様準備）':'';
      body += '■ ['+id+'] '+item.name+hc+' x'+qty+item.unit+' '+fmt(item.price*qty)+'\n';
    }
  }

  body += '\n============================\n';
  body += '送信日時：' + new Date().toLocaleString('ja-JP') + '\n';

  const subject = encodeURIComponent('【発注】' + hi.propName + '（' + (hi.propNum||'番号未記入') + '） 初回セット・補充備品');
  const bodyEnc = encodeURIComponent(body);
  const mailto = 'mailto:customer@bizpato.com?cc=' + encodeURIComponent(hi.email) + '&subject=' + subject + '&body=' + bodyEnc;
  window.location.href = mailto;

  // 送信完了画面へ
  setTimeout(function() {
    document.getElementById('main-content').innerHTML = `
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:16px">📧</div>
        <div style="font-size:22px;font-weight:800;margin-bottom:8px">メールアプリが起動しました</div>
        <div style="color:var(--text-sub);font-size:13px;margin-bottom:24px">内容を確認して送信してください</div>
        <div style="background:var(--bg);border-radius:var(--radius);padding:16px;text-align:left">
          <div style="font-size:11px;color:var(--text-sub)">送信先</div>
          <div style="font-weight:700;margin-bottom:8px;font-family:var(--mono)">customer@bizpato.com</div>
          <div style="font-size:11px;color:var(--text-sub)">物件名</div>
          <div style="font-weight:700;margin-bottom:8px">${hi.propName}</div>
          <div style="font-size:11px;color:var(--text-sub)">合計金額（目安）</div>
          <div style="font-size:24px;font-weight:900;font-family:var(--mono);color:var(--brand)">${fmt(total)}</div>
        </div>
        <button onclick="openStep('dashboard')" class="btn-back" style="margin-top:20px;width:100%">ダッシュボードに戻る</button>
      </div>`;
    const btnArea = document.getElementById('nav-btns-area');
    if (btnArea) btnArea.innerHTML = '';
  }, 800);
}

async function submitOrder() {
  if (!state.webhookUrl){showToast('Webhook URLが設定されていません');return;}
  const btn = document.getElementById('btn-submit');
  btn.textContent='送信中…';btn.disabled=true;
  const items = [];
  for (const g of GRADE_GROUPS) {
    const sel = state.gradeSelections[g.id];
    const qty = state.gradeQty[g.id]||0;
    if (sel && qty>0) {
      const opt = g.options.find(o=>o.grade===sel);
      if (opt) opt.items.forEach(i=>items.push({id:i.id,name:i.name,qty,price:i.price,category:g.name,grade:sel}));
    }
  }
  for (const [k,def] of Object.entries(SET_DEFS)) {
    const qty = state.setQty[k]||0;
    if (qty>0) def.items.forEach(i=>items.push({id:i.id,name:i.name,qty,price:i.price,category:def.title,setKey:k,hostChoice:state.hostChoice[i.id]||'us'}));
  }
  for (const [k,def] of Object.entries(CHOICE_DEFS)) {
    const sel = state.choiceSelections[k];
    const qty = state.choiceQty[k]||0;
    if (sel && qty>0) {
      const opt = def.opts.find(o=>o.key===sel);
      if (opt) {
        if (opt.ids[0]==='MUJI_citrus'||opt.ids[0]==='MUJI_woody') {
          items.push({id:opt.ids[0],name:def.title+'（'+opt.label+'）',qty,price:opt.price,category:def.title});
        } else {
          opt.ids.forEach(id=>{ const item=ITEMS[id]; if(item) items.push({id,name:item.name,qty,price:item.price,category:def.title,choice:sel}); });
        }
      }
    }
  }
  for (const [id,qty] of Object.entries(state.quantities)) {
    if (qty<=0) continue;
    const item = ITEMS[id];
    if (item) items.push({id,name:item.name,qty,unit:item.unit,price:item.price,hostChoice:state.hostChoice[id]||'us'});
  }
  const payload = {submittedAt:new Date().toISOString(),property:state.property,totalAmount:calcTotal(),items,gradeSelections:state.gradeSelections,choiceSelections:state.choiceSelections};
  try {
    await fetch(state.webhookUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    document.getElementById('main-content').innerHTML = `<div style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:16px">📦</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:8px">発注完了しました！</div>
      <div style="color:var(--text-sub);font-size:13px;margin-bottom:24px">Slackに通知が届きます</div>
      <div style="background:var(--bg);border-radius:var(--radius);padding:16px;text-align:left">
        <div style="font-size:11px;color:var(--text-sub)">物件名</div>
        <div style="font-weight:700;margin-bottom:8px">${state.property.name}</div>
        <div style="font-size:11px;color:var(--text-sub)">合計金額（目安）</div>
        <div style="font-size:24px;font-weight:900;font-family:var(--mono);color:var(--accent)">${fmt(calcTotal())}</div>
      </div>
    </div>`;
    document.getElementById('btn-submit').remove();
  } catch(e) {
    showToast('送信エラーが発生しました');
    btn.textContent='📦 この内容で発注する';btn.disabled=false;
  }
}




// ─── イベントハンドラ ───
function changeQty(id, delta) {
  const item = ITEMS[id];
  const step = item ? item.min : 1;
  const cur = state.quantities[id] || 0;
  state.quantities[id] = Math.max(0, cur + delta * step);
  render();
}
function changeGradeQty(gid, delta) {
  state.gradeQty[gid] = Math.max(0, (state.gradeQty[gid]||0) + delta);
  render();
}
function setGrade(gid, grade) {
  state.gradeSelections[gid] = grade;
  if (!(state.gradeQty[gid] > 0)) state.gradeQty[gid] = 1;
  render();
}
function changeSetQty(k, delta) {
  state.setQty[k] = Math.max(0, (state.setQty[k]||0) + delta);
  render();
}
function selectChoice(key, optKey) {
  const prev = state.choiceSelections[key];
  // 前の選択の数量を消す
  if (prev) {
    const prevOpt = CHOICE_DEFS[key].opts.find(o=>o.key===prev);
    if (prevOpt) prevOpt.ids.forEach(id => { if (!id.startsWith('MUJI_')) state.quantities[id] = 0; else state.quantities[id] = 0; });
  }
  state.choiceSelections[key] = optKey;
  const opt = CHOICE_DEFS[key].opts.find(o=>o.key===optKey);
  // デフォルト数量をセット
  if (opt) {
    if (opt.min) {
      // 歯ブラシなど最小発注数あり
      if (!(state.choiceQty[key] > 0)) state.choiceQty[key] = opt.min;
    } else {
      if (!(state.choiceQty[key] > 0)) state.choiceQty[key] = 1;
    }
    // 紐付くIDの数量を同期
    opt.ids.forEach(id => {
      if (id === 'MUJI_citrus' || id === 'MUJI_woody') {
        state.quantities[id] = state.choiceQty[key];
      } else if (ITEMS[id]) {
        state.quantities[id] = state.choiceQty[key] * (ITEMS[id].min || 1);
      }
    });
  }
  render();
}
function changeChoiceQty(key, delta) {
  const opt = CHOICE_DEFS[key].opts.find(o=>o.key===state.choiceSelections[key]);
  if (!opt) return;
  const step = opt.min || 1;
  state.choiceQty[key] = Math.max(0, (state.choiceQty[key]||0) + delta * step);
  // 紐付くIDを同期
  opt.ids.forEach(id => {
    if (id === 'MUJI_citrus' || id === 'MUJI_woody') {
      state.quantities[id] = state.choiceQty[key];
    } else if (ITEMS[id]) {
      state.quantities[id] = state.choiceQty[key];
    }
  });
  render();
}
function setHostChoice(id, val) {
  state.hostChoice[id] = val;
  const item = ITEMS[id];
  if (val === 'host') {
    state.quantities[id] = 0;
  } else {
    // 弊社選択 → 最小発注数をセット
    if (item) state.quantities[id] = item.min;
  }
  render();
}
function setSetHostChoice(setKey, itemId, val) {
  state.hostChoice[itemId] = val;
  render();
}

// ─── 合計計算 ───
function calcTotal() {
  let total = 0;
  // 通常品目
  for (const [id, qty] of Object.entries(state.quantities)) {
    if (qty <= 0) continue;
    if (id === 'MUJI_citrus') { total += 5620 * qty; continue; }
    if (id === 'MUJI_woody')  { total += 5500 * qty; continue; }
    const item = ITEMS[id];
    if (item) total += item.price * qty;
  }
  // グレードグループ
  for (const g of GRADE_GROUPS) {
    const sel = state.gradeSelections[g.id];
    const qty = state.gradeQty[g.id] || 0;
    if (sel && qty > 0) {
      const opt = g.options.find(o=>o.grade===sel);
      if (opt) total += opt.items.reduce((s,i)=>s+i.price,0) * qty;
    }
  }
  // セット
  for (const [k, def] of Object.entries(SET_DEFS)) {
    const qty = state.setQty[k] || 0;
    if (qty > 0) total += def.items.reduce((s,i)=>s+i.price,0) * qty;
  }
  return total;
}

// ─── バリデーション ───
function validateStep1() {
  // セット①：選択肢なし必須品目は常にバリデーションOK
  return [];
}

function validateStep2() {
  const errors = [];
  for (const g of GRADE_GROUPS) {
    if (!state.gradeSelections[g.id]) errors.push(`「${g.name}」のグレードを選択してください`);
  }
  const reqChoices = ['tissue','toilet_deodor','sanitary_bag','room_deodor','laundry','dishsoap','toilet_sheet','toothbrush','softener'];
  for (const k of reqChoices) {
    const def = CHOICE_DEFS[k];
    if (def && def.req && !state.choiceSelections[k]) errors.push(`「${def.title}」を選択してください`);
  }
  return errors;
}

function renderDashboard() {
  const allRequired = REQUIRED_STEPS.every(s => state.completedSteps[s.key]);
  const canSubmit = state.completedSteps['info'] && state.completedSteps['fixed'] && state.completedSteps['select'];

  function taskCard(step, isRequired) {
    const done = state.completedSteps[step.key];
    const icon = done ? '✅' : (isRequired ? '⭕' : '○');
    return '<div onclick="openStep(\''+step.key+'\')" class="task-card'+(done?' done':'')+'">'
      + '<div class="task-card-icon">'+icon+'</div>'
      + '<div class="task-card-body"><div class="task-card-title">'+step.label+'</div>'
      + (done ? '<div class="task-card-sub done-text">完了</div>' : '<div class="task-card-sub">タップして入力</div>')
      + '</div>'
      + '<div class="task-card-arrow">›</div>'
      + '</div>';
  }

  function optCard() {
    const anyDone = OPT_CATS.some(s => state.completedSteps[s.key]);
    const doneCnt = OPT_CATS.filter(s => state.completedSteps[s.key]).length;
    return '<div onclick="openStep(\'optList\')" class="task-card'+(anyDone?' done':'')+'">'
      + '<div class="task-card-icon">○</div>'
      + '<div class="task-card-body"><div class="task-card-title">任意追加品目</div>'
      + '<div class="task-card-sub">'+(doneCnt > 0 ? doneCnt+'カテゴリ選択済み' : '9カテゴリから選択')+'</div>'
      + '</div>'
      + '<div class="task-card-arrow">›</div>'
      + '</div>';
  }

  let html = '<div class="section-head"><div class="section-title">初回セット・補充備品発注フォーム</div><div class="section-sub">各項目を入力して発注を送信してください</div></div>';

  html += '<div class="section-label">必須項目</div>';
  REQUIRED_STEPS.forEach(s => { html += taskCard(s, true); });

  html += '<div class="section-label">推奨・ファミリー</div>';
  html += taskCard(RECOMMEND_STEP, false);
  html += taskCard(FAMILY_STEP, false);

  html += '<div class="section-label">任意追加</div>';
  html += optCard();

  // 送信ボタン
  html += '<button class="btn-submit'+(canSubmit?'':' disabled')+'" '+(canSubmit?'onclick="openStep(\'confirm\')'+'"':'disabled')+'>📦 発注内容を確認する</button>';
  if (!canSubmit) {
    html += '<div style="text-align:center;font-size:11px;color:var(--text-sub);margin-top:8px">必須項目をすべて完了すると送信できます</div>';
  }
  return html;
}

// ─── ステップ描画 ───
function initDefaults() {
  // hostPrepなし・必須品目のみデフォルト数量をセット（hostPrepアイテムは初期値0）
  const mandatoryIds = [
    'S0142','S0034','S0052','B0166','B0185','S0043',
  ];
  mandatoryIds.forEach(function(id) {
    if (state.quantities[id] === undefined || state.quantities[id] === null) {
      const item = ITEMS[id];
      if (item && !item.hostPrep) state.quantities[id] = item.min;
      else if (item && item.hostPrep) state.quantities[id] = 0; // 未選択
    }
  });
  // hostPrepアイテムは全て初期値0（選択待ち）
  Object.keys(ITEMS).forEach(function(id) {
    const item = ITEMS[id];
    if (item && item.hostPrep && (state.quantities[id] === undefined || state.quantities[id] === null)) {
      state.quantities[id] = 0;
    }
  });
  // セットデフォルト数量
  Object.keys(SET_DEFS).forEach(function(k) {
    if (!state.setQty[k]) state.setQty[k] = 1;
  });
  // 詰替選択（未選択でスタート）
  Object.keys(REFILL_CHOICE_DEFS).forEach(function(k) {
    if (!state.refillQty[k]) state.refillQty[k] = 0;
  });
}

}

function renderStep12() {
  const total = calcTotal();
  let rows = '';
  // グレードグループ
  for (const g of GRADE_GROUPS) {
    const sel = state.gradeSelections[g.id];
    const qty = state.gradeQty[g.id] || 0;
    if (sel && qty > 0) {
      const opt = g.options.find(o=>o.grade===sel);
      if (opt) {
        const p = opt.items.reduce((s,i)=>s+i.price,0);
        rows += `<div class="summary-row"><div class="summary-name">${g.name}（${opt.label}）</div><div class="summary-qty">${qty} セット</div><div class="summary-price">${fmt(p*qty)}</div></div>`;
      }
    }
  }
  // セット
  for (const [k, def] of Object.entries(SET_DEFS)) {
    const qty = state.setQty[k] || 0;
    if (qty > 0) {
      const p = def.items.reduce((s,i)=>s+i.price,0);
      rows += `<div class="summary-row"><div class="summary-name">${def.title}</div><div class="summary-qty">${qty} セット</div><div class="summary-price">${fmt(p*qty)}</div></div>`;
    }
  }
  // 選択カード
  for (const [k, def] of Object.entries(CHOICE_DEFS)) {
    const sel = state.choiceSelections[k];
    const qty = state.choiceQty[k] || 0;
    if (sel && qty > 0) {
      const opt = def.opts.find(o=>o.key===sel);
      if (opt) rows += `<div class="summary-row"><div class="summary-name">${def.title}（${opt.label}）</div><div class="summary-qty">${qty} ${opt.unit||'個'}</div><div class="summary-price">${fmt(opt.price*qty)}</div></div>`;
    }
  }
  // 通常品目
  for (const [id, qty] of Object.entries(state.quantities)) {
    if (qty <= 0) continue;
    if (id === 'MUJI_citrus') { rows += `<div class="summary-row"><div class="summary-name">無印良品フレグランス（シトラス）</div><div class="summary-qty">${qty}</div><div class="summary-price">${fmt(5620*qty)}</div></div>`; continue; }
    if (id === 'MUJI_woody')  { rows += `<div class="summary-row"><div class="summary-name">無印良品フレグランス（ウッディ）</div><div class="summary-qty">${qty}</div><div class="summary-price">${fmt(5500*qty)}</div></div>`; continue; }
    const item = ITEMS[id];
    if (item) rows += `<div class="summary-row"><div class="summary-name"><span style="font-family:var(--mono);font-size:10px;color:#94a3b8">${id}</span> ${item.name}</div><div class="summary-qty">${qty} ${item.unit}</div><div class="summary-price">${fmt(item.price*qty)}</div></div>`;
  }
  if (!rows) rows = '<div style="text-align:center;padding:20px;color:var(--text-sub)">選択された品目がありません</div>';
  return `<div class="section-head"><div class="section-title">確認・送信</div><div class="section-sub">内容をご確認の上、発注を送信してください</div></div>
  <div class="summary-card">
    <div style="font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:8px">物件情報</div>
    <div class="summary-row"><div class="summary-name">物件名</div><div class="summary-price">${state.property.name||'—'}</div></div>
    <div class="summary-row"><div class="summary-name">物件番号</div><div class="summary-price">${state.property.number||'—'}</div></div>
    <div class="summary-row"><div class="summary-name">担当者</div><div class="summary-price">${state.property.contact||'—'}</div></div>
  </div>
  <div class="summary-total"><div class="total-label">合計金額（目安）</div><div class="total-amount">${fmt(total)}</div></div>
  <div class="summary-card"><div style="font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:8px">発注品目</div>${rows}</div>`;
}


// ─── 初期化 ───
initDefaults();
state.view = 'dashboard';
render();

</script></body></html>
